name: paper-oco-submit-canary

on:
  workflow_dispatch:
    inputs:
      confirm_live_execution:
        description: "Required exact phrase: CONFIRM LIVE EXECUTION"
        required: true
        type: string
      source_run_id:
        description: "sidecar-dry-run run id to read state from (blank = latest successful dry-run)"
        required: false
        default: ""
        type: string
      require_market_open:
        description: "Require Alpaca paper clock.is_open before POST"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  actions: read
  contents: read

concurrency:
  group: paper-oco-submit-canary-${{ github.ref }}
  cancel-in-progress: false

jobs:
  submit-canary:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      GH_TOKEN: ${{ github.token }}
      ALPHA_ENV: PAPER
      ALPACA_BASE_URL: https://paper-api.alpaca.markets
      ALPACA_KEY_ID: ${{ secrets.ALPACA_KEY_ID }}
      ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
      PAPER_OCO_SUBMIT_STATE_DIR: _paper_oco_state
      PAPER_OCO_CANARY_READ_VERIFY: "true"
      PAPER_OCO_CANARY_SUBMIT_ENABLED: "true"
      PAPER_OCO_CANARY_AUTO_CANCEL: "true"
      PAPER_OCO_CANARY_REQUIRE_MARKET_OPEN: ${{ inputs.require_market_open }}
      PAPER_OCO_CANARY_APPROVAL_PHRASE: ${{ inputs.confirm_live_execution }}
      PAPER_OCO_CANARY_VISIBILITY_DELAY_MS: "1500"
      PAPER_OCO_CANARY_CANCEL_VERIFY_DELAY_MS: "1500"

    steps:
      - name: Verify approval phrase
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ inputs.confirm_live_execution }}" != "CONFIRM LIVE EXECUTION" ]]; then
            echo "Exact approval phrase missing; refusing paper broker mutation." >&2
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Resolve source sidecar run
        id: resolve
        shell: bash
        run: |
          set -euo pipefail
          run_id="${{ inputs.source_run_id }}"
          if [[ -z "${run_id}" ]]; then
            run_id="$(gh run list --repo "${GITHUB_REPOSITORY}" --workflow dry-run.yml --status success --limit 20 --json databaseId --jq '.[0].databaseId')"
          fi
          if [[ -z "${run_id}" || "${run_id}" == "null" ]]; then
            echo "No successful sidecar-dry-run run found" >&2
            exit 1
          fi
          artifact="$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}/artifacts" --jq '.artifacts[] | select(.expired == false) | select(.name | startswith("sidecar-state-")) | .name' | head -n 1)"
          if [[ -z "${artifact}" ]]; then
            echo "No non-expired sidecar-state artifact found for run ${run_id}" >&2
            exit 1
          fi
          echo "run_id=${run_id}" >> "${GITHUB_OUTPUT}"
          echo "artifact=${artifact}" >> "${GITHUB_OUTPUT}"
          echo "Resolved source sidecar run ${run_id} artifact ${artifact}"

      - name: Download source sidecar state artifact
        shell: bash
        run: |
          set -euo pipefail
          rm -rf _paper_oco_state
          mkdir -p _paper_oco_state
          gh run download "${{ steps.resolve.outputs.run_id }}" \
            --repo "${GITHUB_REPOSITORY}" \
            --name "${{ steps.resolve.outputs.artifact }}" \
            --dir _paper_oco_state
          test -f _paper_oco_state/paper-oco-canary-candidate.json
          test -f _paper_oco_state/paper-oco-canary-approval-gate.json
          test -f _paper_oco_state/paper-oco-canary-submit-gate.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Submit one approved paper OCO canary and rollback
        run: npm run ops:paper-oco-submit-gate

      - name: Build paper OCO canary result report
        if: always()
        run: npm run ops:paper-oco-result

      - name: Sync paper OCO canary result to Notion
        if: always()
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_AUTOMATION_INCIDENT_LOG: ${{ vars.NOTION_DB_AUTOMATION_INCIDENT_LOG }}
          NOTION_PAPER_OCO_CANARY_RESULT_SYNC_ENABLED: "true"
          NOTION_PAPER_OCO_CANARY_RESULT_SYNC_REQUIRED: "false"
        run: npm run sync:notion:paper-oco-result

      - name: Verify submit, visibility, rollback, and terminal ledger
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          node --input-type=module <<'NODE'
          import fs from 'node:fs';
          const report = JSON.parse(fs.readFileSync('_paper_oco_state/paper-oco-canary-submit-gate.json', 'utf8'));
          const failures = [];
          if (report.executionPolicy?.brokerMutationRequested !== true) failures.push('brokerMutationRequested_not_true');
          if (report.brokerMutation?.attempted !== true) failures.push('brokerMutation_attempted_not_true');
          if (report.brokerMutation?.submitted !== true) failures.push('brokerMutation_submitted_not_true');
          if (report.postSubmitVisibility?.ok !== true) failures.push('nested_visibility_not_ok');
          if (report.rollback?.ok !== true) failures.push('rollback_cancel_not_ok');
          if (report.rollback?.terminalVerified !== true) failures.push('rollback_terminal_not_verified');
          if (report.idempotency?.terminal !== true) failures.push('idempotency_terminal_not_true');
          if (report.selected?.canaryQty !== 1) failures.push('canaryQty_not_one');
          console.log(JSON.stringify({
            overall: report.overall,
            decision: report.decision?.status,
            selectedSymbol: report.summary?.selectedSymbol,
            brokerMutationAttempted: report.summary?.brokerMutationAttempted,
            brokerMutationSubmitted: report.summary?.brokerMutationSubmitted,
            postSubmitVisibility: report.postSubmitVisibility?.ok,
            rollbackTerminal: report.summary?.rollbackTerminal,
            ledgerTerminal: report.summary?.ledgerTerminal,
            clientOrderId: report.summary?.clientOrderId
          }, null, 2));
          if (failures.length) {
            console.error(`paper OCO canary verification failed: ${failures.join(',')}`);
            process.exit(1);
          }
          NODE

      - name: Publish summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Paper OCO Submit Canary"
            echo "- sourceRun: \`${{ steps.resolve.outputs.run_id }}\`"
            echo "- sourceArtifact: \`${{ steps.resolve.outputs.artifact }}\`"
            echo "- brokerMutation: \`approved one-row PAPER OCO canary with auto-cancel rollback\`"
            echo ""
            if [[ -f _paper_oco_state/paper-oco-canary-submit-gate.md ]]; then
              cat _paper_oco_state/paper-oco-canary-submit-gate.md
            else
              echo "- status: \`missing _paper_oco_state/paper-oco-canary-submit-gate.md\`"
            fi
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload submit canary artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: paper-oco-submit-canary-${{ github.run_id }}
          path: |
            _paper_oco_state/paper-oco-canary-submit-gate.json
            _paper_oco_state/paper-oco-canary-submit-gate.md
            _paper_oco_state/paper-oco-canary-submit-ledger.json
            _paper_oco_state/paper-oco-canary-result-report.json
            _paper_oco_state/paper-oco-canary-result-report.md
          if-no-files-found: warn
