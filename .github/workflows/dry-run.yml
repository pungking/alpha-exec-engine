              hfAudit.runSummaryHfLivePromotion,
              hfAudit.nextActionMarker,
              hfAudit.runSummaryHfNextAction,
              hfAudit.dailyVerdictMarker,
              hfAudit.runSummaryHfDailyVerdict,
              hfAudit.payloadPathStickyMarker,
              hfAudit.runSummaryHfPayloadPathSticky,
              hfAudit.evidenceMarker,
              hfAudit.runSummaryHfEvidence
            ];
            const markerAuditRunEvent = String(hfAudit.runEvent ?? "").toLowerCase();
            const allowDedupeMarkerNA = markerAuditRunEvent === "dedupe";
            const markerAuditFieldOk = (value) =>
              value === "ok" || (allowDedupeMarkerNA && value === "n/a_dedupe");
            tuningSignals.markerAuditKnown = true;
            tuningSignals.markerAuditOk = markerAuditFields.every(markerAuditFieldOk);
            lines.push(
              `- hf_marker_audit: \`soft=${hfAudit.softGate ?? "missing"} drift=${hfAudit.driftMarker ?? "missing"} runSummary=${hfAudit.runSummaryHfDrift ?? "missing"} shadow=${hfAudit.shadowMarker ?? "missing"} runSummaryShadow=${hfAudit.runSummaryHfShadow ?? "missing"} runSummaryShadowTrend=${hfAudit.runSummaryHfShadowTrend ?? "missing"} tuningPhase=${hfAudit.tuningPhaseMarker ?? "missing"} runSummaryTuningPhase=${hfAudit.runSummaryHfTuningPhase ?? "missing"} tuningAdvice=${hfAudit.tuningAdviceMarker ?? "missing"} runSummaryTuningAdvice=${hfAudit.runSummaryHfTuningAdvice ?? "missing"} freeze=${hfAudit.freezeMarker ?? "missing"} runSummaryFreeze=${hfAudit.runSummaryHfFreeze ?? "missing"} payloadProbe=${hfAudit.payloadProbeMarker ?? "missing"} runSummaryPayloadProbe=${hfAudit.runSummaryHfPayloadProbe ?? "missing"} alert=${hfAudit.alertMarker ?? "missing"} runSummaryAlert=${hfAudit.runSummaryHfAlert ?? "missing"} livePromotion=${hfAudit.livePromotionMarker ?? "missing"} runSummaryLivePromotion=${hfAudit.runSummaryHfLivePromotion ?? "missing"} nextAction=${hfAudit.nextActionMarker ?? "missing"} runSummaryNextAction=${hfAudit.runSummaryHfNextAction ?? "missing"} dailyVerdict=${hfAudit.dailyVerdictMarker ?? "missing"} runSummaryDailyVerdict=${hfAudit.runSummaryHfDailyVerdict ?? "missing"} payloadPathSticky=${hfAudit.payloadPathStickyMarker ?? "missing"} runSummaryPayloadPathSticky=${hfAudit.runSummaryHfPayloadPathSticky ?? "missing"} evidence=${hfAudit.evidenceMarker ?? "missing"} runSummaryEvidence=${hfAudit.runSummaryHfEvidence ?? "missing"} runEvent=${hfAudit.runEvent ?? "unknown"}\``
            );
            if (allowDedupeMarkerNA) {
              lines.push("- dedupe_notice: `run_event=dedupe; marker n/a is expected; preview metrics may come from last non-dedupe execution`");
            }
          } else {
            lines.push("- hf_marker_audit: `soft=missing drift=missing runSummary=missing shadow=missing runSummaryShadow=missing runSummaryShadowTrend=missing tuningPhase=missing runSummaryTuningPhase=missing tuningAdvice=missing runSummaryTuningAdvice=missing freeze=missing runSummaryFreeze=missing payloadProbe=missing runSummaryPayloadProbe=missing alert=missing runSummaryAlert=missing livePromotion=missing runSummaryLivePromotion=missing nextAction=missing runSummaryNextAction=missing dailyVerdict=missing runSummaryDailyVerdict=missing payloadPathSticky=missing runSummaryPayloadPathSticky=missing evidence=missing runSummaryEvidence=missing`");
          }

          if (fs.existsSync(idempPath)) {
            const idemp = JSON.parse(fs.readFileSync(idempPath, "utf8"));
            const count = idemp?.orders && typeof idemp.orders === "object" ? Object.keys(idemp.orders).length : 0;
            lines.push(`- idempotency key store: \`${count}\` keys`);
          } else {
            lines.push("- idempotency key store: not found");
          }
          const lifecyclePath = "state/order-ledger.json";
          if (fs.existsSync(lifecyclePath)) {
            const lifecycle = JSON.parse(fs.readFileSync(lifecyclePath, "utf8"));
            const count =
              lifecycle?.orders && typeof lifecycle.orders === "object"
                ? Object.keys(lifecycle.orders).length
                : 0;
            lines.push(`- order lifecycle store: \`${count}\` keys`);
          } else {
            lines.push("- order lifecycle store: not found");
          }
          const regimeStatePath = "state/regime-guard-state.json";
          if (fs.existsSync(regimeStatePath)) {
            const regimeState = JSON.parse(fs.readFileSync(regimeStatePath, "utf8"));
            lines.push(
              `- regime guard state: \`profile=${regimeState.lastProfile || "N/A"} switchedAt=${regimeState.lastSwitchedAt || "N/A"}\``
            );
          } else {
            lines.push("- regime guard state: not found");
          }
          const perfLoopPath = "state/stage6-20trade-loop.json";
          if (fs.existsSync(perfLoopPath)) {
            const perfLoop = JSON.parse(fs.readFileSync(perfLoopPath, "utf8"));
            const tradeCount =
              perfLoop?.rows && typeof perfLoop.rows === "object"
                ? Object.keys(perfLoop.rows).length
                : 0;
            const snapshotCount = Array.isArray(perfLoop?.snapshots) ? perfLoop.snapshots.length : 0;
            const requiredTrades = 20;
            lines.push(
              `- perf_loop: \`batch=${perfLoop?.batchId || "N/A"} trades=${tradeCount} snapshots=${snapshotCount}\``
            );
            let gateStatus = "PENDING_SAMPLE";
            let gateReason = `sample_insufficient(trades=${tradeCount},required>=${requiredTrades})`;
            let gateProgress = `${tradeCount}/${requiredTrades}`;
            if (snapshotCount > 0) {
              const latestSnapshot = perfLoop.snapshots[snapshotCount - 1] || {};
              const fillRate = Number.isFinite(Number(latestSnapshot.fillRatePct))
                ? Number(latestSnapshot.fillRatePct).toFixed(2)
                : "N/A";
              const avgR = Number.isFinite(Number(latestSnapshot.avgR))
                ? Number(latestSnapshot.avgR).toFixed(4)
                : "N/A";
              const holdErr = Number.isFinite(Number(latestSnapshot.medianHoldErrorDays))
                ? Number(latestSnapshot.medianHoldErrorDays).toFixed(2)
                : "N/A";
              const drift = Number.isFinite(Number(latestSnapshot.noReasonDrift))
                ? Number(latestSnapshot.noReasonDrift)
                : "N/A";
              lines.push(
                `- perf_loop_latest_kpi: \`trades=${latestSnapshot.tradeCount ?? tradeCount} fillRatePct=${fillRate} avgR=${avgR} holdErrMedian=${holdErr} noReasonDrift=${drift}\``
              );
              const snapshotTradeCount = Number(latestSnapshot.tradeCount ?? tradeCount);
              const hasEnoughTrades = snapshotTradeCount >= requiredTrades;
              const passFill = Number(latestSnapshot.fillRatePct) >= 60;
              const passAvgR = Number(latestSnapshot.avgR) > 0;
              const passDrift = Number(latestSnapshot.noReasonDrift) === 0;
              gateProgress = `${Math.min(snapshotTradeCount, requiredTrades)}/${requiredTrades}`;
              if (hasEnoughTrades) {
                const failReasons = [];
                if (!passFill) failReasons.push("fill_rate_below_60");
                if (!passAvgR) failReasons.push("avgR_not_positive");
                if (!passDrift) failReasons.push("reason_drift_detected");
                if (failReasons.length === 0) {
                  gateStatus = "GO";
                  gateReason = "all_must_pass_checks_ok";
                } else {
                  gateStatus = "NO_GO";
                  gateReason = failReasons.join("|");
                }
              } else {
                gateStatus = "PENDING_SAMPLE";
                gateReason = `sample_insufficient(trades=${snapshotTradeCount},required>=${requiredTrades})`;
              }
            } else {
              lines.push("- perf_loop_latest_kpi: `N/A (no 10-trade snapshot yet)`");
            }
            lines.push(`- perf_loop_gate_status: \`${gateStatus}\``);
            lines.push(`- perf_loop_gate_reason: \`${gateReason}\``);
            lines.push(`- perf_loop_gate_progress: \`${gateProgress}\``);
            const notifiedMilestones =
              Array.isArray(perfLoop?.notifiedMilestones)
                ? perfLoop.notifiedMilestones
                    .map((value) => Number(value))
                    .filter((value) => Number.isFinite(value) && value > 0)
                    .sort((a, b) => a - b)
                : [];
            const nextMilestone = [10, 20].find((value) => !notifiedMilestones.includes(value));
            lines.push(
              `- perf_loop_milestones: \`notified=${notifiedMilestones.length ? notifiedMilestones.join(",") : "none"} next=${nextMilestone ?? "none"}\``
            );
            tuningSignals.perfGateStatus = gateStatus;
            tuningSignals.perfGateReason = gateReason;
            tuningSignals.perfGateProgress = gateProgress;
          } else {
            lines.push("- perf_loop: not found");
          }

          let tuningCommentStatus = "INFO";
          let tuningCommentAction = "monitor";
          let tuningCommentReason = "insufficient_context";
          if (tuningSignals.markerAuditKnown && !tuningSignals.markerAuditOk) {
            tuningCommentStatus = "BLOCKED_OBSERVABILITY";
            tuningCommentAction = "fix_marker_gap_first";
            tuningCommentReason = "hf_marker_audit_has_missing";
          } else if (tuningSignals.livePromotionStatus === "BLOCK") {
            tuningCommentStatus = "BLOCK_LIVE_PROMOTION";
            tuningCommentAction = "resolve_live_promotion_blocker";
            tuningCommentReason = tuningSignals.livePromotionReason;
          } else if (tuningSignals.livePromotionStatus === "PASS") {
            tuningCommentStatus = "LIVE_READY";
            tuningCommentAction = "review_and_promote_live";
            tuningCommentReason = tuningSignals.livePromotionReason;
          } else if (tuningSignals.freezeStatus === "UNFREEZE_REVIEW") {
            tuningCommentStatus = "REVIEW_TUNE";
            tuningCommentAction = "review_unfreeze_thresholds";
            tuningCommentReason = tuningSignals.freezeReason;
          } else if (tuningSignals.freezeStatus === "FROZEN") {
            tuningCommentStatus = "FREEZE_READY";
            tuningCommentAction = "keep_frozen_baseline";
            tuningCommentReason = tuningSignals.freezeReason;
          } else if (tuningSignals.adviceStatus === "ADJUST") {
            tuningCommentStatus = "REVIEW_TUNE";
            tuningCommentAction = tuningSignals.adviceAction;
            tuningCommentReason = tuningSignals.adviceReason;
          } else if (tuningSignals.adviceStatus === "FREEZE") {
            tuningCommentStatus = "FREEZE_READY";
            tuningCommentAction = "freeze_baseline_and_monitor";
            tuningCommentReason = tuningSignals.adviceReason;
          } else if (String(tuningSignals.payloadProbeStatus).startsWith("WARN_")) {
            tuningCommentStatus = "REVIEW_PROBE_WARN";
            tuningCommentAction = "inspect_payload_path_logic";
            tuningCommentReason = tuningSignals.payloadProbeReason;
          } else if (tuningSignals.phase === "OBSERVE_ONLY") {
            tuningCommentStatus = "HOLD_OBSERVE";
            tuningCommentAction = "accumulate_more_runs_before_tuning";
            tuningCommentReason = tuningSignals.perfGateReason || tuningSignals.phaseReason;
          } else if (tuningSignals.phase === "REVIEW_ONLY") {
            tuningCommentStatus = "REVIEW_TUNE";
            tuningCommentAction = "apply_small_threshold_adjustment";
            tuningCommentReason = tuningSignals.phaseReason;
          } else if (tuningSignals.phase === "FREEZE_READY") {
            tuningCommentStatus = "FREEZE_READY";
            tuningCommentAction = "freeze_baseline_and_monitor";
            tuningCommentReason = tuningSignals.phaseReason;
          }
          lines.push(
            `- hf_tuning_comment: \`status=${tuningCommentStatus} action=${tuningCommentAction} reason=${tuningCommentReason} phase=${tuningSignals.phase} advice=${tuningSignals.adviceStatus} freeze=${tuningSignals.freezeStatus} livePromotion=${tuningSignals.livePromotionStatus} gate=${tuningSignals.perfGateStatus} progress=${tuningSignals.perfGateProgress} payloadProbe=${tuningSignals.payloadProbeStatus} markerAuditOk=${tuningSignals.markerAuditKnown ? tuningSignals.markerAuditOk : "N/A"}\``
          );

          lines.push("");

          if (includeValidationPack && fs.existsSync("state/validation-pack")) {
            const cases = ["off", "on", "strict"];
            const packLines = [];
            packLines.push("## Entry Feasibility Validation Pack");
            packLines.push("| case | stage6Hash | payloads/skipped | enforce/maxDist | blocked | preflight |");
            packLines.push("|---|---|---|---|---|---|");

            for (const c of cases) {
              const runPath = `state/validation-pack/${c}/last-run.json`;
              const previewPathCase = `state/validation-pack/${c}/last-dry-exec-preview.json`;
              if (!fs.existsSync(runPath) || !fs.existsSync(previewPathCase)) {
                packLines.push(`| ${c} | N/A | N/A | N/A | N/A | N/A |`);
                continue;
              }
              const runState = JSON.parse(fs.readFileSync(runPath, "utf8"));
              const previewCase = JSON.parse(fs.readFileSync(previewPathCase, "utf8"));
              const stageHash = (runState.lastStage6Sha256 || "").slice(0, 12) || "N/A";
              const payloads = `${previewCase.payloadCount ?? "N/A"}/${previewCase.skippedCount ?? "N/A"}`;
              const entryFeas = previewCase.entryFeasibility || {};
              const enforce = entryFeas.enforce ?? "N/A";
              const maxDist = entryFeas.maxDistancePct ?? "N/A";
              const blocked = entryFeas.blocked ?? "N/A";
              const preflight = previewCase.preflight || {};
              const preflightCell = `${preflight.status ?? "N/A"}:${preflight.code ?? "N/A"}`;
              packLines.push(`| ${c} | ${stageHash} | ${payloads} | ${enforce}/${maxDist} | ${blocked} | ${preflightCell} |`);
            }
            packLines.push("");
            lines.push(...packLines);
          }

          if (
            includePayloadProbe &&
            fs.existsSync("state/payload-probe/last-run.json") &&
            fs.existsSync("state/payload-probe/last-dry-exec-preview.json")
          ) {
            const probeRun = JSON.parse(fs.readFileSync("state/payload-probe/last-run.json", "utf8"));
            const probePreview = JSON.parse(fs.readFileSync("state/payload-probe/last-dry-exec-preview.json", "utf8"));
            const probeLines = [];
            probeLines.push("## Payload Path Probe");
            probeLines.push(`- stage6Hash: \`${(probeRun.lastStage6Sha256 || "").slice(0, 12) || "N/A"}\``);
            probeLines.push(`- payloads/skipped: \`${probePreview.payloadCount ?? "N/A"}/${probePreview.skippedCount ?? "N/A"}\``);
            probeLines.push(
              `- preflight: \`${probePreview?.preflight?.status ?? "N/A"}:${probePreview?.preflight?.code ?? "N/A"}\``
            );
            const stage6Contract = probePreview?.stage6Contract || {};
            probeLines.push(
              `- stage6_contract: \`enforce=${stage6Contract.enforce ?? "N/A"} checked=${stage6Contract.checked ?? "N/A"} executable=${stage6Contract.executable ?? "N/A"} blocked=${stage6Contract.blocked ?? "N/A"}\``
            );
            const probeForced = probePreview?.hfPayloadProbe || {};
            probeLines.push(
              `- hf_payload_probe_forced: \`mode=${probeForced.requestedMode ?? "N/A"} active=${probeForced.active ?? "N/A"} modified=${probeForced.modified ?? "N/A"} reason=${probeForced.reason ?? "N/A"} symbol=${probeForced.symbol ?? "N/A"} basePayloads=${probeForced.basePayloadCount ?? "N/A"} baseApplied=${probeForced.baseApplied ?? "N/A"} baseTighten=${probeForced.baseTighten ?? "N/A"} baseRelief=${probeForced.baseRelief ?? "N/A"} baseSizeReduced=${probeForced.baseSizeReduced ?? "N/A"} baseSizeSaved=${probeForced.baseSizeReductionNotional ?? "N/A"}\``
            );
            const probeSkipCounts =
              probePreview?.skipReasonCounts && typeof probePreview.skipReasonCounts === "object"
                ? probePreview.skipReasonCounts
                : Array.isArray(probePreview?.skipped)
                    ? probePreview.skipped.reduce((acc, row) => {
                        const key = String(row?.reason || "unknown");
                        acc[key] = (acc[key] || 0) + 1;
                        return acc;
                      }, {})
                    : {};
            const probeSkipCell =
              Object.keys(probeSkipCounts).length > 0
                ? Object.entries(probeSkipCounts)
                    .sort((a, b) => Number(b[1]) - Number(a[1]))
                    .map(([k, v]) => `${k}:${v}`)
                    .join(", ")
                : "none";
            probeLines.push(`- skip_reasons: \`${probeSkipCell}\``);
            probeLines.push("");
            lines.push(...probeLines);
          }

          fs.appendFileSync(summaryPath, lines.join("\n") + "\n");
          NODE

      - name: Build performance dashboard snapshot
        if: always()
        run: npm run dashboard:perf

      - name: Publish performance dashboard summary
        if: always()
        run: |
          if [[ -f state/performance-dashboard.md ]]; then
            cat state/performance-dashboard.md >> "${GITHUB_STEP_SUMMARY}"
          else
            echo "## Trading Performance Dashboard" >> "${GITHUB_STEP_SUMMARY}"
            echo "- status: \`missing state/performance-dashboard.md\`" >> "${GITHUB_STEP_SUMMARY}"
            echo "" >> "${GITHUB_STEP_SUMMARY}"
          fi

      - name: Build ops health snapshot
        if: always()
        run: npm run ops:health:dry-run

      - name: Publish ops health summary
        if: always()
        run: |
          if [[ -f state/ops-health-report.md ]]; then
            cat state/ops-health-report.md >> "${GITHUB_STEP_SUMMARY}"
          else
            echo "## Sidecar Ops Health" >> "${GITHUB_STEP_SUMMARY}"
            echo "- status: \`missing state/ops-health-report.md\`" >> "${GITHUB_STEP_SUMMARY}"
            echo "" >> "${GITHUB_STEP_SUMMARY}"
          fi

      - name: Sync dry-run summary to Notion
        if: always()
        continue-on-error: ${{ vars.NOTION_SIDECAR_SYNC_REQUIRED != 'true' && vars.NOTION_HF_TUNING_TRACKER_SYNC_REQUIRED != 'true' && vars.NOTION_PERFORMANCE_DASHBOARD_SYNC_REQUIRED != 'true' && vars.NOTION_AUTOMATION_INCIDENT_LOG_SYNC_REQUIRED != 'true' && vars.NOTION_KEY_ROTATION_LEDGER_SYNC_REQUIRED != 'true' }}
        env:
          NOTION_SYNC_KIND: dry_run
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_DAILY_SNAPSHOT: ${{ vars.NOTION_DB_DAILY_SNAPSHOT }}
          NOTION_DB_HF_TUNING_TRACKER: ${{ vars.NOTION_DB_HF_TUNING_TRACKER }}
          NOTION_DB_PERFORMANCE_DASHBOARD: ${{ vars.NOTION_DB_PERFORMANCE_DASHBOARD }}
          NOTION_DB_AUTOMATION_INCIDENT_LOG: ${{ vars.NOTION_DB_AUTOMATION_INCIDENT_LOG }}
          NOTION_DB_KEY_ROTATION_LEDGER: ${{ vars.NOTION_DB_KEY_ROTATION_LEDGER }}
          NOTION_SIDECAR_SYNC_ENABLED: ${{ vars.NOTION_SIDECAR_SYNC_ENABLED }}
          NOTION_SIDECAR_SYNC_REQUIRED: ${{ vars.NOTION_SIDECAR_SYNC_REQUIRED }}
          NOTION_HF_TUNING_TRACKER_SYNC_ENABLED: ${{ vars.NOTION_HF_TUNING_TRACKER_SYNC_ENABLED }}
          NOTION_HF_TUNING_TRACKER_SYNC_REQUIRED: ${{ vars.NOTION_HF_TUNING_TRACKER_SYNC_REQUIRED }}
          NOTION_PERFORMANCE_DASHBOARD_SYNC_ENABLED: ${{ vars.NOTION_PERFORMANCE_DASHBOARD_SYNC_ENABLED }}
          NOTION_PERFORMANCE_DASHBOARD_SYNC_REQUIRED: ${{ vars.NOTION_PERFORMANCE_DASHBOARD_SYNC_REQUIRED }}
          NOTION_AUTOMATION_INCIDENT_LOG_SYNC_ENABLED: ${{ vars.NOTION_AUTOMATION_INCIDENT_LOG_SYNC_ENABLED }}
          NOTION_AUTOMATION_INCIDENT_LOG_SYNC_REQUIRED: ${{ vars.NOTION_AUTOMATION_INCIDENT_LOG_SYNC_REQUIRED }}
          NOTION_KEY_ROTATION_LEDGER_SYNC_ENABLED: ${{ vars.NOTION_KEY_ROTATION_LEDGER_SYNC_ENABLED }}
          NOTION_KEY_ROTATION_LEDGER_SYNC_REQUIRED: ${{ vars.NOTION_KEY_ROTATION_LEDGER_SYNC_REQUIRED }}
          GHA_JOB_STATUS: ${{ job.status }}
        run: node scripts/sync-notion-summary.mjs

      - name: Auto-trigger validation pack on 20/20
        if: always()
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_VALIDATION_PACK_INPUT: ${{ github.event_name == 'workflow_dispatch' && inputs.validation_pack || 'false' }}
          RUN_PAYLOAD_PROBE_INPUT: ${{ github.event_name == 'workflow_dispatch' && inputs.payload_probe || 'false' }}
        run: node scripts/maybe-trigger-validation-pack.mjs

      - name: Upload sidecar state artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: sidecar-state-${{ github.run_id }}
          path: |
            state/last-run.json
            state/last-dry-exec-preview.json
            state/hf-marker-audit.json
            state/hf-shadow-last.json
            state/hf-shadow-history.jsonl
            state/hf-evidence-history.jsonl
            state/hf-tuning-freeze.json
            state/hf-live-promotion-state.json
            state/last-run-output.log
            state/order-idempotency.json
            state/order-ledger.json
            state/open-entry-replace-guard.json
            state/regime-guard-state.json
            state/stage6-20trade-loop.json
            state/stage6-20trade-loop.csv
            state/performance-dashboard.json
            state/performance-dashboard.md
            state/ops-health-report.json
            state/ops-health-report.md
            state/validation-pack-auto-trigger.json
            state/validation-pack/**
            state/payload-probe/**
          if-no-files-found: warn

      - name: Save sidecar state
        if: always()
        uses: actions/cache/save@v5
        with:
          path: state
          key: sidecar-state-${{ github.ref_name }}-${{ github.run_id }}
