# REFERENCE WORKFLOW (sidecar template mirror)
# - This file mirrors pungking/alpha-exec-engine/.github/workflows/dry-run.yml.
# - It is not executed inside US_Alpha_Seeker.
# - US_Alpha_Seeker uses schedule/bridge workflows only for dispatch + failover.
name: sidecar-dry-run

on:
  workflow_dispatch:
    inputs:
      run_force_send_once:
        description: "Force send once for current stage6Hash+mode (manual run only)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      run_verify_mode:
        description: "Manual safety/verification preset"
        required: false
        default: "safe_default"
        type: choice
        options:
          - "safe_default"
          - "submit_pass"
          - "guard_skip_pass"
          - "auto"
      run_allow_entry_outside_rth:
        description: "Allow entry outside RTH for this manual run only"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      run_actionable_include_speculative_buy:
        description: "Include SPECULATIVE_BUY in actionable verdicts for this manual run"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      run_position_lifecycle_enabled:
        description: "Enable position lifecycle action-intent scaffold for this manual run"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      run_position_lifecycle_preview_only:
        description: "Keep lifecycle scaffold preview-only (no behavior change)"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      run_position_lifecycle_action_preset:
        description: "Lifecycle action types preset"
        required: false
        default: "ENTRY_AND_HOLD"
        type: choice
        options:
          - "ENTRY_AND_HOLD"
          - "ENTRY_ONLY"
          - "ALL"
          - "CUSTOM"
      run_position_lifecycle_action_types_override:
        description: "Lifecycle action types when preset=CUSTOM (comma-separated)"
        required: false
        default: ""
        type: string
      run_lifecycle_selftest:
        description: "Run lifecycle guard self-test logs (manual validation only)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      run_disable_order_idempotency:
        description: "Disable idempotency gate for this manual run only (validation)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      run_dry_max_orders_override:
        description: "Override DRY_MAX_ORDERS for this manual run only (blank=keep default)"
        required: false
        default: ""
        type: string
      run_dry_max_total_notional_override:
        description: "Override DRY_MAX_TOTAL_NOTIONAL for this manual run only (blank=keep default)"
        required: false
        default: ""
        type: string
      validation_pack:
        description: "Run OFF/ON/STRICT entry feasibility checks in one workflow run"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      payload_probe:
        description: "Run one-shot payload path probe (temporary risk-off conviction override)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      payload_probe_mode:
        description: "Payload probe mode (HF forced path): tighten or relief"
        required: false
        default: "tighten"
        type: choice
        options:
          - "tighten"
          - "relief"
      payload_probe_min_conviction:
        description: "Temporary DRY_RISK_OFF_MIN_CONVICTION for payload probe"
        required: false
        default: "30"
        type: choice
        options:
          - "20"
          - "30"
          - "40"
          - "50"
  schedule:
    # RTH simulation cadence (UTC, weekdays): every 15m in broad US cash-session window.
    # - Covers DST (EDT) and non-DST (EST) without manual seasonal edits.
    # - Final execution still gated by preflight market-open checks in code.
    - cron: "5,20,35,50 13-21 * * 1-5"
  repository_dispatch:
    types:
      - stage6_result_created

concurrency:
  group: sidecar-dry-run-${{ github.ref }}
  cancel-in-progress: false

jobs:
  dry-run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      RUN_VERIFY_MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.run_verify_mode || 'auto' }}
      EXEC_ENABLED: ${{ vars.EXEC_ENABLED }}
      READ_ONLY: ${{ vars.READ_ONLY }}
      SIMULATION_LIVE_PARITY: ${{ vars.SIMULATION_LIVE_PARITY }}
      POLICY_VERSION: stage6-exec-v1.0-rc1
      TZ: ${{ vars.TZ }}
      DRY_NOTIONAL_PER_TRADE: ${{ vars.DRY_NOTIONAL_PER_TRADE }}
      DRY_MAX_ORDERS: ${{ vars.DRY_MAX_ORDERS }}
      DRY_MAX_TOTAL_NOTIONAL: ${{ vars.DRY_MAX_TOTAL_NOTIONAL }}
      DRY_MIN_CONVICTION: ${{ vars.DRY_MIN_CONVICTION }}
      DRY_MIN_STOP_DISTANCE_PCT: ${{ vars.DRY_MIN_STOP_DISTANCE_PCT }}
      DRY_MAX_STOP_DISTANCE_PCT: ${{ vars.DRY_MAX_STOP_DISTANCE_PCT }}
      ENTRY_FEASIBILITY_ENFORCE: ${{ vars.ENTRY_FEASIBILITY_ENFORCE }}
      ENTRY_MAX_DISTANCE_PCT: ${{ vars.ENTRY_MAX_DISTANCE_PCT }}
      STAGE6_EXECUTION_BUCKET_ENFORCE: ${{ vars.STAGE6_EXECUTION_BUCKET_ENFORCE }}
      ACTIONABLE_INCLUDE_SPECULATIVE_BUY: ${{ github.event_name == 'workflow_dispatch' && inputs.run_actionable_include_speculative_buy || vars.ACTIONABLE_INCLUDE_SPECULATIVE_BUY }}
      ORDER_IDEMPOTENCY_ENABLED: ${{ vars.ORDER_IDEMPOTENCY_ENABLED }}
      ORDER_IDEMPOTENCY_ENFORCE_DRY_RUN: ${{ vars.ORDER_IDEMPOTENCY_ENFORCE_DRY_RUN }}
      ORDER_IDEMPOTENCY_TTL_DAYS: ${{ vars.ORDER_IDEMPOTENCY_TTL_DAYS }}
      PREFLIGHT_ENABLED: ${{ vars.PREFLIGHT_ENABLED }}
      DAILY_MAX_NOTIONAL: ${{ vars.DAILY_MAX_NOTIONAL }}
      ALLOW_ENTRY_OUTSIDE_RTH: ${{ github.event_name == 'workflow_dispatch' && inputs.run_allow_entry_outside_rth || vars.ALLOW_ENTRY_OUTSIDE_RTH }}
      PREFLIGHT_BLOCKING_HARD_FAIL: ${{ vars.PREFLIGHT_BLOCKING_HARD_FAIL }}
      PREFLIGHT_SOFT_CODES: ${{ vars.PREFLIGHT_SOFT_CODES }}
      ORDER_LIFECYCLE_ENABLED: ${{ vars.ORDER_LIFECYCLE_ENABLED }}
      ORDER_LEDGER_TTL_DAYS: ${{ vars.ORDER_LEDGER_TTL_DAYS }}
      LIVE_ORDER_SUBMIT_ENABLED: ${{ vars.LIVE_ORDER_SUBMIT_ENABLED }}
      LIVE_ORDER_SUBMIT_REQUIRE_PERF_GATE_GO: ${{ vars.LIVE_ORDER_SUBMIT_REQUIRE_PERF_GATE_GO }}
      LIVE_ORDER_SUBMIT_REQUIRE_HF_LIVE_PROMOTION_PASS: ${{ vars.LIVE_ORDER_SUBMIT_REQUIRE_HF_LIVE_PROMOTION_PASS }}
      FORCE_SEND_ONCE: ${{ github.event_name == 'workflow_dispatch' && inputs.run_force_send_once || vars.FORCE_SEND_ONCE }}
      TELEGRAM_HEARTBEAT_ON_DEDUPE: ${{ vars.TELEGRAM_HEARTBEAT_ON_DEDUPE }}
      TELEGRAM_MAX_MESSAGE_LENGTH: ${{ vars.TELEGRAM_MAX_MESSAGE_LENGTH }}
      POSITION_LIFECYCLE_ENABLED: ${{ github.event_name == 'workflow_dispatch' && inputs.run_position_lifecycle_enabled || vars.POSITION_LIFECYCLE_ENABLED }}
      POSITION_LIFECYCLE_PREVIEW_ONLY: ${{ github.event_name == 'workflow_dispatch' && inputs.run_position_lifecycle_preview_only || vars.POSITION_LIFECYCLE_PREVIEW_ONLY }}
      POSITION_LIFECYCLE_ACTION_TYPES: ${{ vars.POSITION_LIFECYCLE_ACTION_TYPES }}
      POSITION_LIFECYCLE_SCALE_UP_MIN_CONVICTION: ${{ vars.POSITION_LIFECYCLE_SCALE_UP_MIN_CONVICTION }}
      POSITION_LIFECYCLE_SCALE_DOWN_PCT: ${{ vars.POSITION_LIFECYCLE_SCALE_DOWN_PCT }}
      POSITION_LIFECYCLE_EXIT_PARTIAL_PCT: ${{ vars.POSITION_LIFECYCLE_EXIT_PARTIAL_PCT }}
      POSITION_LIFECYCLE_SCALE_DOWN_MAX_CONVICTION: ${{ vars.POSITION_LIFECYCLE_SCALE_DOWN_MAX_CONVICTION }}
      POSITION_LIFECYCLE_EXIT_PARTIAL_MAX_CONVICTION: ${{ vars.POSITION_LIFECYCLE_EXIT_PARTIAL_MAX_CONVICTION }}
      POSITION_LIFECYCLE_EXIT_FULL_MAX_CONVICTION: ${{ vars.POSITION_LIFECYCLE_EXIT_FULL_MAX_CONVICTION }}
      POSITION_LIFECYCLE_EXIT_ON_WATCHLIST: ${{ vars.POSITION_LIFECYCLE_EXIT_ON_WATCHLIST }}
      POSITION_LIFECYCLE_EXIT_ON_BLOCKED: ${{ vars.POSITION_LIFECYCLE_EXIT_ON_BLOCKED }}
      POSITION_LIFECYCLE_EXIT_FULL_MAX_LOSS_PCT: ${{ vars.POSITION_LIFECYCLE_EXIT_FULL_MAX_LOSS_PCT }}
      POSITION_LIFECYCLE_EXIT_PARTIAL_MAX_LOSS_PCT: ${{ vars.POSITION_LIFECYCLE_EXIT_PARTIAL_MAX_LOSS_PCT }}
      POSITION_LIFECYCLE_SCALE_DOWN_MAX_LOSS_PCT: ${{ vars.POSITION_LIFECYCLE_SCALE_DOWN_MAX_LOSS_PCT }}
      POSITION_LIFECYCLE_RISK_OFF_INTRADAY_SHOCK_PCT: ${{ vars.POSITION_LIFECYCLE_RISK_OFF_INTRADAY_SHOCK_PCT }}
      POSITION_LIFECYCLE_TAKE_PROFIT_PARTIAL_PCT: ${{ vars.POSITION_LIFECYCLE_TAKE_PROFIT_PARTIAL_PCT }}
      POSITION_LIFECYCLE_STALE_HOLD_DAYS: ${{ vars.POSITION_LIFECYCLE_STALE_HOLD_DAYS }}
      LIFECYCLE_SELFTEST: ${{ github.event_name == 'workflow_dispatch' && inputs.run_lifecycle_selftest || vars.LIFECYCLE_SELFTEST }}
      APPROVAL_REQUIRED: ${{ vars.APPROVAL_REQUIRED }}
      APPROVAL_ENFORCE_IN_PREVIEW: ${{ vars.APPROVAL_ENFORCE_IN_PREVIEW }}
      APPROVAL_QUEUE_FILE_NAME: ${{ vars.APPROVAL_QUEUE_FILE_NAME }}
      APPROVAL_REQUEST_TTL_MINUTES: ${{ vars.APPROVAL_REQUEST_TTL_MINUTES }}
      HF_SENTIMENT_SOFT_GATE_ENABLED: ${{ vars.HF_SENTIMENT_SOFT_GATE_ENABLED }}
      HF_SENTIMENT_SCORE_FLOOR: ${{ vars.HF_SENTIMENT_SCORE_FLOOR }}
      HF_SENTIMENT_MIN_ARTICLE_COUNT: ${{ vars.HF_SENTIMENT_MIN_ARTICLE_COUNT }}
      HF_SENTIMENT_MAX_NEWS_AGE_HOURS: ${{ vars.HF_SENTIMENT_MAX_NEWS_AGE_HOURS }}
      HF_EARNINGS_WINDOW_ENABLED: ${{ vars.HF_EARNINGS_WINDOW_ENABLED }}
      HF_EARNINGS_WINDOW_BLOCK_DAYS: ${{ vars.HF_EARNINGS_WINDOW_BLOCK_DAYS }}
      HF_EARNINGS_WINDOW_REDUCE_DAYS: ${{ vars.HF_EARNINGS_WINDOW_REDUCE_DAYS }}
      HF_EARNINGS_WINDOW_REDUCE_FACTOR: ${{ vars.HF_EARNINGS_WINDOW_REDUCE_FACTOR }}
      HF_SENTIMENT_POSITIVE_RELIEF_MAX: ${{ vars.HF_SENTIMENT_POSITIVE_RELIEF_MAX }}
      HF_SENTIMENT_NEGATIVE_TIGHTEN_MAX: ${{ vars.HF_SENTIMENT_NEGATIVE_TIGHTEN_MAX }}
      HF_PAYLOAD_PROBE_MODE: off
      HF_NEGATIVE_SIZE_REDUCTION_ENABLED: ${{ vars.HF_NEGATIVE_SIZE_REDUCTION_ENABLED }}
      HF_NEGATIVE_SIZE_REDUCTION_PCT: ${{ vars.HF_NEGATIVE_SIZE_REDUCTION_PCT }}
      SHADOW_DATA_BUS_ENABLED: ${{ vars.SHADOW_DATA_BUS_ENABLED }}
      SHADOW_SOURCE_ALPACA_ENABLED: ${{ vars.SHADOW_SOURCE_ALPACA_ENABLED }}
      SHADOW_SOURCE_ALPHA_VANTAGE_ENABLED: ${{ vars.SHADOW_SOURCE_ALPHA_VANTAGE_ENABLED }}
      SHADOW_SOURCE_SEC_EDGAR_ENABLED: ${{ vars.SHADOW_SOURCE_SEC_EDGAR_ENABLED }}
      SHADOW_SOURCE_PERPLEXITY_ENABLED: ${{ vars.SHADOW_SOURCE_PERPLEXITY_ENABLED }}
      SHADOW_SOURCE_SUPABASE_ENABLED: ${{ vars.SHADOW_SOURCE_SUPABASE_ENABLED }}
      HF_SHADOW_ENABLED: ${{ vars.HF_SHADOW_ENABLED }}
      HF_ALERT_ENABLED: ${{ vars.HF_ALERT_ENABLED }}
      HF_ALERT_SHADOW_PAYLOAD_DELTA_ABS: ${{ vars.HF_ALERT_SHADOW_PAYLOAD_DELTA_ABS }}
      HF_ALERT_SHADOW_NOTIONAL_DELTA_ABS: ${{ vars.HF_ALERT_SHADOW_NOTIONAL_DELTA_ABS }}
      HF_ALERT_SHADOW_SKIPPED_DELTA_ABS: ${{ vars.HF_ALERT_SHADOW_SKIPPED_DELTA_ABS }}
      HF_DRIFT_ALERT_ENABLED: ${{ vars.HF_DRIFT_ALERT_ENABLED }}
      HF_DRIFT_ALERT_WINDOW_RUNS: ${{ vars.HF_DRIFT_ALERT_WINDOW_RUNS }}
      HF_DRIFT_ALERT_MIN_HISTORY: ${{ vars.HF_DRIFT_ALERT_MIN_HISTORY }}
      HF_DRIFT_ALERT_MIN_CANDIDATES: ${{ vars.HF_DRIFT_ALERT_MIN_CANDIDATES }}
      HF_DRIFT_ALERT_NEGATIVE_RATIO_SPIKE: ${{ vars.HF_DRIFT_ALERT_NEGATIVE_RATIO_SPIKE }}
      HF_DRIFT_ALERT_NEGATIVE_RATIO_DELTA: ${{ vars.HF_DRIFT_ALERT_NEGATIVE_RATIO_DELTA }}
      HF_DRIFT_ALERT_APPLIED_RATIO_DROP: ${{ vars.HF_DRIFT_ALERT_APPLIED_RATIO_DROP }}
      HF_DRIFT_ALERT_APPLIED_RATIO_FLOOR: ${{ vars.HF_DRIFT_ALERT_APPLIED_RATIO_FLOOR }}
      HF_TUNING_FREEZE_ENABLED: ${{ vars.HF_TUNING_FREEZE_ENABLED }}
      HF_TUNING_FREEZE_STABLE_RUNS: ${{ vars.HF_TUNING_FREEZE_STABLE_RUNS }}
      HF_TUNING_UNFREEZE_ALERT_STREAK: ${{ vars.HF_TUNING_UNFREEZE_ALERT_STREAK }}
      HF_TUNING_FREEZE_REQUIRE_PROGRESS: ${{ vars.HF_TUNING_FREEZE_REQUIRE_PROGRESS }}
      HF_TUNING_FREEZE_MAX_SHADOW_ALERT_RATE: ${{ vars.HF_TUNING_FREEZE_MAX_SHADOW_ALERT_RATE }}
      HF_LIVE_PROMOTION_REQUIRE_PERF_GATE_GO: ${{ vars.HF_LIVE_PROMOTION_REQUIRE_PERF_GATE_GO }}
      HF_LIVE_PROMOTION_REQUIRE_FREEZE_FROZEN: ${{ vars.HF_LIVE_PROMOTION_REQUIRE_FREEZE_FROZEN }}
      HF_LIVE_PROMOTION_REQUIRE_SHADOW_STABLE: ${{ vars.HF_LIVE_PROMOTION_REQUIRE_SHADOW_STABLE }}
      HF_LIVE_PROMOTION_REQUIRE_PAYLOAD_PATH_VERIFIED: ${{ vars.HF_LIVE_PROMOTION_REQUIRE_PAYLOAD_PATH_VERIFIED }}
      HF_LIVE_PROMOTION_PAYLOAD_PATH_STICKY_HOURS: ${{ vars.HF_LIVE_PROMOTION_PAYLOAD_PATH_STICKY_HOURS }}
      VALIDATION_PACK_AUTO_TRIGGER_ENABLED: ${{ vars.VALIDATION_PACK_AUTO_TRIGGER_ENABLED }}
      REGIME_AUTO_ENABLED: ${{ vars.REGIME_AUTO_ENABLED }}
      REGIME_FORCE_PROFILE: ${{ vars.REGIME_FORCE_PROFILE }}
      REGIME_VIX_SOURCE_PRIORITY: ${{ vars.REGIME_VIX_SOURCE_PRIORITY }}
      REGIME_SNAPSHOT_MAX_AGE_MIN: ${{ vars.REGIME_SNAPSHOT_MAX_AGE_MIN }}
      REGIME_QUALITY_GUARD_ENABLED: ${{ vars.REGIME_QUALITY_GUARD_ENABLED }}
      REGIME_QUALITY_MIN_SCORE: ${{ vars.REGIME_QUALITY_MIN_SCORE }}
      REGIME_HYSTERESIS_ENABLED: ${{ vars.REGIME_HYSTERESIS_ENABLED }}
      REGIME_MIN_HOLD_MIN: ${{ vars.REGIME_MIN_HOLD_MIN }}
      REGIME_VIX_MISMATCH_PCT: ${{ vars.REGIME_VIX_MISMATCH_PCT }}
      GUARD_CONTROL_ENFORCE: ${{ vars.GUARD_CONTROL_ENFORCE }}
      GUARD_CONTROL_MAX_AGE_MIN: ${{ vars.GUARD_CONTROL_MAX_AGE_MIN }}
      GUARD_QUALITY_MIN_SCORE: ${{ vars.GUARD_QUALITY_MIN_SCORE }}
      VIX_RISK_ON_THRESHOLD: ${{ vars.VIX_RISK_ON_THRESHOLD }}
      VIX_RISK_OFF_THRESHOLD: ${{ vars.VIX_RISK_OFF_THRESHOLD }}
      DRY_STOP_DISTANCE_STAGE6_SYNC: ${{ vars.DRY_STOP_DISTANCE_STAGE6_SYNC }}
      VITE_STAGE6_MIN_STOP_DISTANCE_PCT: ${{ vars.VITE_STAGE6_MIN_STOP_DISTANCE_PCT }}
      VITE_STAGE6_MAX_STOP_DISTANCE_PCT: ${{ vars.VITE_STAGE6_MAX_STOP_DISTANCE_PCT }}

      DRY_DEFAULT_NOTIONAL_PER_TRADE: ${{ vars.DRY_DEFAULT_NOTIONAL_PER_TRADE }}
      DRY_DEFAULT_MAX_ORDERS: ${{ vars.DRY_DEFAULT_MAX_ORDERS }}
      DRY_DEFAULT_MAX_TOTAL_NOTIONAL: ${{ vars.DRY_DEFAULT_MAX_TOTAL_NOTIONAL }}
      DRY_DEFAULT_MIN_CONVICTION: ${{ vars.DRY_DEFAULT_MIN_CONVICTION }}
      DRY_DEFAULT_MIN_CONVICTION_FLOOR: ${{ vars.DRY_DEFAULT_MIN_CONVICTION_FLOOR }}
      DRY_DEFAULT_MIN_CONVICTION_CEILING: ${{ vars.DRY_DEFAULT_MIN_CONVICTION_CEILING }}
      DRY_DEFAULT_MIN_STOP_DISTANCE_PCT: ${{ vars.DRY_DEFAULT_MIN_STOP_DISTANCE_PCT }}
      DRY_DEFAULT_MAX_STOP_DISTANCE_PCT: ${{ vars.DRY_DEFAULT_MAX_STOP_DISTANCE_PCT }}

      DRY_RISK_OFF_NOTIONAL_PER_TRADE: ${{ vars.DRY_RISK_OFF_NOTIONAL_PER_TRADE }}
      DRY_RISK_OFF_MAX_ORDERS: ${{ vars.DRY_RISK_OFF_MAX_ORDERS }}
      DRY_RISK_OFF_MAX_TOTAL_NOTIONAL: ${{ vars.DRY_RISK_OFF_MAX_TOTAL_NOTIONAL }}
      DRY_RISK_OFF_MIN_CONVICTION: ${{ vars.DRY_RISK_OFF_MIN_CONVICTION }}
      DRY_RISK_OFF_MIN_CONVICTION_FLOOR: ${{ vars.DRY_RISK_OFF_MIN_CONVICTION_FLOOR }}
      DRY_RISK_OFF_MIN_CONVICTION_CEILING: ${{ vars.DRY_RISK_OFF_MIN_CONVICTION_CEILING }}
      DRY_RISK_OFF_MIN_STOP_DISTANCE_PCT: ${{ vars.DRY_RISK_OFF_MIN_STOP_DISTANCE_PCT }}
      DRY_RISK_OFF_MAX_STOP_DISTANCE_PCT: ${{ vars.DRY_RISK_OFF_MAX_STOP_DISTANCE_PCT }}

      ALPACA_KEY_ID: ${{ secrets.ALPACA_KEY_ID }}
      ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
      ALPACA_BASE_URL: ${{ vars.ALPACA_BASE_URL }}
      ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY || secrets.ALPHA_VANTAGE_KEY }}
      PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY || secrets.VITE_PERPLEXITY_API_KEY }}

      GDRIVE_CLIENT_ID: ${{ secrets.GDRIVE_CLIENT_ID }}
      GDRIVE_CLIENT_SECRET: ${{ secrets.GDRIVE_CLIENT_SECRET }}
      GDRIVE_REFRESH_TOKEN: ${{ secrets.GDRIVE_REFRESH_TOKEN }}
      FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
      CNBC_RAPIDAPI_ENABLED: ${{ vars.CNBC_RAPIDAPI_ENABLED }}
      CNBC_RAPIDAPI_KEY: ${{ secrets.CNBC_RAPIDAPI_KEY }}
      RAPID_API_KEY: ${{ secrets.RAPID_API_KEY }}
      CNBC_RAPIDAPI_HOST: ${{ vars.CNBC_RAPIDAPI_HOST }}
      CNBC_RAPIDAPI_ENDPOINT: ${{ vars.CNBC_RAPIDAPI_ENDPOINT }}
      CNBC_RAPIDAPI_SYMBOL_PARAM: ${{ vars.CNBC_RAPIDAPI_SYMBOL_PARAM }}
      GDRIVE_ROOT_FOLDER_ID: ${{ vars.GDRIVE_ROOT_FOLDER_ID }}
      GDRIVE_MARKET_SNAPSHOT_FOLDER_ID: ${{ vars.GDRIVE_MARKET_SNAPSHOT_FOLDER_ID }}
      GDRIVE_STAGE6_FOLDER: ${{ vars.GDRIVE_STAGE6_FOLDER }}
      GDRIVE_REPORT_FOLDER: ${{ vars.GDRIVE_REPORT_FOLDER }}

      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_PRIMARY_CHAT_ID: ${{ vars.TELEGRAM_PRIMARY_CHAT_ID }}
      TELEGRAM_SIMULATION_CHAT_ID: ${{ vars.TELEGRAM_SIMULATION_CHAT_ID }}
      TELEGRAM_ALERT_CHAT_ID: ${{ vars.TELEGRAM_ALERT_CHAT_ID || vars.TELEGRAM_SIMULATION_CHAT_ID }}
      WORKFLOW_EVENT_NAME: ${{ github.event_name }}
      WORKFLOW_EVENT_ACTION: ${{ github.event.action || '' }}
      TRIGGER_STAGE6_HASH: ${{ github.event.client_payload.stage6Hash || github.event.client_payload.stage6_hash || '' }}
      TRIGGER_STAGE6_FILE: ${{ github.event.client_payload.stage6File || github.event.client_payload.stage6_file || '' }}
      TRIGGER_STAGE6_SOURCE_RUN: ${{ github.event.client_payload.sourceRunId || github.event.client_payload.source_run_id || '' }}

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"

      - name: Restore sidecar state
        id: restore_state
        uses: actions/cache/restore@v5
        with:
          path: state
          key: sidecar-state-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            sidecar-state-${{ github.ref_name }}-

      - name: Install
        run: npm ci

      - name: HF Verify gate (validation pack)
        id: hf_verify_gate
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.validation_pack == 'true' }}
        run: npm run verify:hf

      - name: Build
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.validation_pack == 'true') }}
        run: npm run build

      - name: Check JSON parse guard
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.validation_pack == 'true') }}
        run: npm run check:json-parse-guard

      - name: Refresh market guard state
        run: npm run guard

      - name: Trigger context
        run: |
          echo "[TRIGGER] event=${WORKFLOW_EVENT_NAME} action=${WORKFLOW_EVENT_ACTION:-n/a}"
          echo "[TRIGGER] stage6Hash=${TRIGGER_STAGE6_HASH:-n/a} stage6File=${TRIGGER_STAGE6_FILE:-n/a} sourceRun=${TRIGGER_STAGE6_SOURCE_RUN:-n/a}"
          echo "[VERIFY_MODE] requested=${RUN_VERIFY_MODE}"

      - name: Resolve verify mode safety preset (manual)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          RUN_VERIFY_MODE: ${{ env.RUN_VERIFY_MODE }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os
          import sys

          requested = (os.getenv("RUN_VERIFY_MODE") or "safe_default").strip().lower()
          preset_map = {
              "auto": [],
              "safe_default": [
                  "READ_ONLY=true",
                  "EXEC_ENABLED=false",
                  "SIMULATION_LIVE_PARITY=false",
                  "LIVE_ORDER_SUBMIT_ENABLED=false",
                  "ALLOW_ENTRY_OUTSIDE_RTH=false",
                  "FORCE_SEND_ONCE=false",
              ],
              "submit_pass": [
                  "READ_ONLY=false",
                  "EXEC_ENABLED=true",
                  "SIMULATION_LIVE_PARITY=true",
                  "LIVE_ORDER_SUBMIT_ENABLED=true",
                  "ENTRY_OPEN_ORDER_GUARD_ENABLED=false",
                  "ENTRY_OPEN_ORDER_STALE_CANCEL_ENABLED=false",
              ],
              "guard_skip_pass": [
                  "READ_ONLY=false",
                  "EXEC_ENABLED=true",
                  "SIMULATION_LIVE_PARITY=true",
                  "LIVE_ORDER_SUBMIT_ENABLED=true",
                  "ENTRY_OPEN_ORDER_GUARD_ENABLED=true",
                  "ENTRY_OPEN_ORDER_STALE_CANCEL_ENABLED=false",
              ],
          }

          if requested not in preset_map:
              print(
                  "::error::run_verify_mode must be one of "
                  "safe_default|submit_pass|guard_skip_pass|auto"
              )
              sys.exit(1)

          lines = list(preset_map[requested])
          lines.append(f"RUN_VERIFY_MODE_EFFECTIVE={requested}")
          lines.append(f"RUN_VERIFY_MODE_REQUESTED={requested}")

          github_env = os.getenv("GITHUB_ENV")
          if not github_env:
              print("::error::GITHUB_ENV not found.")
              sys.exit(1)
          with open(github_env, "a", encoding="utf-8") as f:
              f.write("\n".join(lines) + "\n")

          override_log = ",".join(lines[:-2]) if len(lines) > 2 else "none"
          print(f"[VERIFY_MODE] requested={requested} applied={requested} overrides={override_log}")
          PY

      - name: Resolve lifecycle action types (manual)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          RUN_LIFECYCLE_ACTION_PRESET: ${{ inputs.run_position_lifecycle_action_preset }}
          RUN_LIFECYCLE_ACTION_OVERRIDE: ${{ inputs.run_position_lifecycle_action_types_override }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os
          import sys

          preset = (os.getenv("RUN_LIFECYCLE_ACTION_PRESET") or "").strip().upper()
          override_raw = os.getenv("RUN_LIFECYCLE_ACTION_OVERRIDE") or ""
          allowed = [
              "ENTRY_NEW",
              "HOLD_WAIT",
              "SCALE_UP",
              "SCALE_DOWN",
              "EXIT_PARTIAL",
              "EXIT_FULL",
          ]

          preset_map = {
              "ENTRY_AND_HOLD": "ENTRY_NEW,HOLD_WAIT",
              "ENTRY_ONLY": "ENTRY_NEW",
              "ALL": ",".join(allowed),
              "CUSTOM": override_raw,
          }
          if preset not in preset_map:
              print(f"::error::Unknown run_position_lifecycle_action_preset: {preset or 'EMPTY'}")
              sys.exit(1)

          raw = preset_map[preset]
          tokens = [t.strip().upper() for t in raw.split(",") if t.strip()]
          if not tokens:
              print("::error::Resolved lifecycle action types are empty.")
              if preset == "CUSTOM":
                  print("::error::Set run_position_lifecycle_action_types_override when preset=CUSTOM.")
              sys.exit(1)

          invalid = [t for t in tokens if t not in allowed]
          if invalid:
              print(f"::error::Invalid lifecycle action type(s): {', '.join(invalid)}")
              print(f"::error::Allowed values: {', '.join(allowed)}")
              sys.exit(1)

          deduped = list(dict.fromkeys(tokens))
          resolved = ",".join(deduped)
          print(f"[LIFECYCLE_ACTION_PRESET] preset={preset} resolved={resolved}")

          github_env = os.getenv("GITHUB_ENV")
          if not github_env:
              print("::error::GITHUB_ENV not found.")
              sys.exit(1)
          with open(github_env, "a", encoding="utf-8") as f:
              f.write(f"POSITION_LIFECYCLE_ACTION_TYPES={resolved}\n")
          PY

      - name: Resolve manual validation overrides
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          RUN_DISABLE_ORDER_IDEMPOTENCY: ${{ inputs.run_disable_order_idempotency }}
          RUN_DRY_MAX_ORDERS_OVERRIDE: ${{ inputs.run_dry_max_orders_override }}
          RUN_DRY_MAX_TOTAL_NOTIONAL_OVERRIDE: ${{ inputs.run_dry_max_total_notional_override }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os
          import sys

          disable_idemp = (os.getenv("RUN_DISABLE_ORDER_IDEMPOTENCY") or "false").strip().lower() == "true"
          max_orders_raw = (os.getenv("RUN_DRY_MAX_ORDERS_OVERRIDE") or "").strip()
          max_total_notional_raw = (os.getenv("RUN_DRY_MAX_TOTAL_NOTIONAL_OVERRIDE") or "").strip()
          github_env = os.getenv("GITHUB_ENV")
          if not github_env:
            print("::error::GITHUB_ENV not found.")
            sys.exit(1)

          lines = []
          if disable_idemp:
            lines.append("ORDER_IDEMPOTENCY_ENABLED=false")
            lines.append("ORDER_IDEMPOTENCY_ENFORCE_DRY_RUN=false")

          if max_orders_raw:
            try:
              max_orders = int(max_orders_raw)
            except ValueError:
              print(f"::error::run_dry_max_orders_override must be integer, got={max_orders_raw!r}")
              sys.exit(1)
            if max_orders <= 0:
              print(f"::error::run_dry_max_orders_override must be > 0, got={max_orders}")
              sys.exit(1)
            lines.append(f"DRY_MAX_ORDERS={max_orders}")

          if max_total_notional_raw:
            try:
              max_total_notional = float(max_total_notional_raw)
            except ValueError:
              print(
                f"::error::run_dry_max_total_notional_override must be number, got={max_total_notional_raw!r}"
              )
              sys.exit(1)
            if max_total_notional <= 0:
              print(
                f"::error::run_dry_max_total_notional_override must be > 0, got={max_total_notional}"
              )
              sys.exit(1)
            lines.append(f"DRY_MAX_TOTAL_NOTIONAL={max_total_notional}")

          if lines:
            print(f"[MANUAL_OVERRIDES] {' '.join(lines)}")
            with open(github_env, "a", encoding="utf-8") as f:
              f.write("\n".join(lines) + "\n")
          else:
            print("[MANUAL_OVERRIDES] none")
          PY

      - name: Run dry-run bootstrap
        if: ${{ !(github.event_name == 'workflow_dispatch' && (inputs.validation_pack == 'true' || inputs.payload_probe == 'true')) }}
        run: |
          set -euo pipefail
          mkdir -p state
          : > state/last-run-output.log
          node dist/src/index.js 2>&1 | tee -a state/last-run-output.log

      - name: Run validation pack (OFF/ON/STRICT)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.validation_pack == 'true' }}
        run: |
          set -euo pipefail
          mkdir -p state/validation-pack/off state/validation-pack/on state/validation-pack/strict
          : > state/last-run-output.log

          echo "[PACK] OFF: ENTRY_FEASIBILITY_ENFORCE=false, ENTRY_MAX_DISTANCE_PCT=15"
          ENTRY_FEASIBILITY_ENFORCE=false ENTRY_MAX_DISTANCE_PCT=15 FORCE_SEND_ONCE=true node dist/src/index.js 2>&1 | tee -a state/last-run-output.log
          cp state/last-run.json state/validation-pack/off/last-run.json
          cp state/last-dry-exec-preview.json state/validation-pack/off/last-dry-exec-preview.json

          echo "[PACK] ON: ENTRY_FEASIBILITY_ENFORCE=true, ENTRY_MAX_DISTANCE_PCT=15"
          ENTRY_FEASIBILITY_ENFORCE=true ENTRY_MAX_DISTANCE_PCT=15 FORCE_SEND_ONCE=true node dist/src/index.js 2>&1 | tee -a state/last-run-output.log
          cp state/last-run.json state/validation-pack/on/last-run.json
          cp state/last-dry-exec-preview.json state/validation-pack/on/last-dry-exec-preview.json

          echo "[PACK] STRICT: ENTRY_FEASIBILITY_ENFORCE=true, ENTRY_MAX_DISTANCE_PCT=1"
          ENTRY_FEASIBILITY_ENFORCE=true ENTRY_MAX_DISTANCE_PCT=1 FORCE_SEND_ONCE=true node dist/src/index.js 2>&1 | tee -a state/last-run-output.log
          cp state/last-run.json state/validation-pack/strict/last-run.json
          cp state/last-dry-exec-preview.json state/validation-pack/strict/last-dry-exec-preview.json

      - name: Run payload path probe (one-shot)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.validation_pack != 'true' && inputs.payload_probe == 'true' }}
        run: |
          set -euo pipefail
          mkdir -p state/payload-probe
          : > state/last-run-output.log
          PROBE_MIN_CONV="${{ inputs.payload_probe_min_conviction }}"
          PROBE_MODE="${{ inputs.payload_probe_mode }}"
          echo "[PROBE] payload path with DRY_RISK_OFF_MIN_CONVICTION=${PROBE_MIN_CONV} HF_PAYLOAD_PROBE_MODE=${PROBE_MODE} (forced dry-safe lane)"
          # Keep probe execution in a dry-safe lane so payload-path verification can be written without live-submit risk.
          READ_ONLY=true \
          EXEC_ENABLED=false \
          SIMULATION_LIVE_PARITY=false \
          LIVE_ORDER_SUBMIT_ENABLED=false \
          TELEGRAM_SEND_ENABLED=false \
          HF_PAYLOAD_PROBE_MODE="${PROBE_MODE}" \
          DRY_RISK_OFF_MIN_CONVICTION="${PROBE_MIN_CONV}" \
          FORCE_SEND_ONCE=true \
          node dist/src/index.js 2>&1 | tee -a state/last-run-output.log
          cp state/last-run.json state/payload-probe/last-run.json
          cp state/last-dry-exec-preview.json state/payload-probe/last-dry-exec-preview.json

      - name: HF marker audit (warning-only)
        if: always()
        run: |
          set -euo pipefail
          mkdir -p state
          LOG_PATH="state/last-run-output.log"
          SOFT_GATE="missing"
          DRIFT_MARKER="missing"
          RUN_SUMMARY_HF_DRIFT="missing"
          SHADOW_MARKER="missing"
          RUN_SUMMARY_HF_SHADOW="missing"
          RUN_SUMMARY_HF_SHADOW_TREND="missing"
          TUNING_PHASE_MARKER="missing"
          RUN_SUMMARY_HF_TUNING_PHASE="missing"
          TUNING_ADVICE_MARKER="missing"
          RUN_SUMMARY_HF_TUNING_ADVICE="missing"
          FREEZE_MARKER="missing"
          RUN_SUMMARY_HF_FREEZE="missing"
          PAYLOAD_PROBE_MARKER="missing"
          RUN_SUMMARY_HF_PAYLOAD_PROBE="missing"
          ALERT_MARKER="missing"
          RUN_SUMMARY_HF_ALERT="missing"
          LIVE_PROMOTION_MARKER="missing"
          RUN_SUMMARY_HF_LIVE_PROMOTION="missing"
          NEXT_ACTION_MARKER="missing"
          RUN_SUMMARY_HF_NEXT_ACTION="missing"
          DAILY_VERDICT_MARKER="missing"
          RUN_SUMMARY_HF_DAILY_VERDICT="missing"
          PAYLOAD_PATH_STICKY_MARKER="missing"
          RUN_SUMMARY_HF_PAYLOAD_PATH_STICKY="missing"
          EVIDENCE_MARKER="missing"
          RUN_SUMMARY_HF_EVIDENCE="missing"
          RUN_EVENT="unknown"

          if [[ -f "${LOG_PATH}" ]]; then
            if grep -Eq '\[RUN_SUMMARY\] event=dedupe\b' "${LOG_PATH}"; then
              RUN_EVENT="dedupe"
            elif grep -Eq '\[RUN_SUMMARY\] event=blocked_preflight\b' "${LOG_PATH}"; then
              RUN_EVENT="blocked_preflight"
            elif grep -Eq '\[RUN_SUMMARY\] event=sent\b' "${LOG_PATH}"; then
              RUN_EVENT="sent"
            elif grep -Eq '\[RUN_SUMMARY\] event=' "${LOG_PATH}"; then
              RUN_EVENT="other"
            fi
            grep -q '\[HF_SOFT_GATE\]' "${LOG_PATH}" && SOFT_GATE="ok" || true
            grep -Eq '\[HF_DRIFT\]|\[HF_DRIFT_SUMMARY\]' "${LOG_PATH}" && DRIFT_MARKER="ok" || true
            grep -Eq '\[RUN_SUMMARY\].*hf_drift=' "${LOG_PATH}" && RUN_SUMMARY_HF_DRIFT="ok" || true
            grep -q '\[HF_SHADOW\]' "${LOG_PATH}" && SHADOW_MARKER="ok" || true
            grep -Eq '\[RUN_SUMMARY\].*hf_shadow=' "${LOG_PATH}" && RUN_SUMMARY_HF_SHADOW="ok" || true
            grep -Eq '\[RUN_SUMMARY\].*hf_shadow_trend=' "${LOG_PATH}" && RUN_SUMMARY_HF_SHADOW_TREND="ok" || true
            grep -q '\[HF_TUNING_PHASE\]' "${LOG_PATH}" && TUNING_PHASE_MARKER="ok" || true
            grep -Eq '\[RUN_SUMMARY\].*hf_tuning_phase=' "${LOG_PATH}" && RUN_SUMMARY_HF_TUNING_PHASE="ok" || true
            grep -q '\[HF_TUNING_ADVICE\]' "${LOG_PATH}" && TUNING_ADVICE_MARKER="ok" || true
            grep -Eq '\[RUN_SUMMARY\].*hf_tuning_advice=' "${LOG_PATH}" && RUN_SUMMARY_HF_TUNING_ADVICE="ok" || true
            grep -q '\[HF_FREEZE\]' "${LOG_PATH}" && FREEZE_MARKER="ok" || true
            grep -Eq '\[RUN_SUMMARY\].*hf_freeze=' "${LOG_PATH}" && RUN_SUMMARY_HF_FREEZE="ok" || true
            grep -q '\[HF_PAYLOAD_PROBE\]' "${LOG_PATH}" && PAYLOAD_PROBE_MARKER="ok" || true
            grep -Eq '\[RUN_SUMMARY\].*hf_payload_probe_forced=' "${LOG_PATH}" && RUN_SUMMARY_HF_PAYLOAD_PROBE="ok" || true
            grep -Eq '\[HF_ALERT\]|\[HF_ALERT_SUMMARY\]' "${LOG_PATH}" && ALERT_MARKER="ok" || true
            grep -Eq '\[RUN_SUMMARY\].*hf_alert=' "${LOG_PATH}" && RUN_SUMMARY_HF_ALERT="ok" || true
            grep -q '\[HF_LIVE_PROMOTION\]' "${LOG_PATH}" && LIVE_PROMOTION_MARKER="ok" || true
            grep -Eq '\[RUN_SUMMARY\].*hf_live_promotion=' "${LOG_PATH}" && RUN_SUMMARY_HF_LIVE_PROMOTION="ok" || true
            grep -q '\[HF_NEXT_ACTION\]' "${LOG_PATH}" && NEXT_ACTION_MARKER="ok" || true
            grep -Eq '\[RUN_SUMMARY\].*hf_next_action=' "${LOG_PATH}" && RUN_SUMMARY_HF_NEXT_ACTION="ok" || true
            grep -q '\[HF_DAILY_VERDICT\]' "${LOG_PATH}" && DAILY_VERDICT_MARKER="ok" || true
            grep -Eq '\[RUN_SUMMARY\].*hf_daily_verdict=' "${LOG_PATH}" && RUN_SUMMARY_HF_DAILY_VERDICT="ok" || true
            grep -q '\[HF_PAYLOAD_PATH_STICKY\]' "${LOG_PATH}" && PAYLOAD_PATH_STICKY_MARKER="ok" || true
            grep -Eq '\[RUN_SUMMARY\].*hf_payload_path_sticky=' "${LOG_PATH}" && RUN_SUMMARY_HF_PAYLOAD_PATH_STICKY="ok" || true
            grep -q '\[HF_EVIDENCE\]' "${LOG_PATH}" && EVIDENCE_MARKER="ok" || true
            grep -Eq '\[RUN_SUMMARY\].*hf_evidence=' "${LOG_PATH}" && RUN_SUMMARY_HF_EVIDENCE="ok" || true
          fi

          if [[ "${RUN_EVENT}" == "dedupe" ]]; then
            [[ "${SOFT_GATE}" == "missing" ]] && SOFT_GATE="n/a_dedupe"
            [[ "${DRIFT_MARKER}" == "missing" ]] && DRIFT_MARKER="n/a_dedupe"
            [[ "${ALERT_MARKER}" == "missing" ]] && ALERT_MARKER="n/a_dedupe"
            [[ "${PAYLOAD_PATH_STICKY_MARKER}" == "missing" ]] && PAYLOAD_PATH_STICKY_MARKER="n/a_dedupe"
            [[ "${EVIDENCE_MARKER}" == "missing" ]] && EVIDENCE_MARKER="n/a_dedupe"
          fi

          node - "${SOFT_GATE}" "${DRIFT_MARKER}" "${RUN_SUMMARY_HF_DRIFT}" "${SHADOW_MARKER}" "${RUN_SUMMARY_HF_SHADOW}" "${RUN_SUMMARY_HF_SHADOW_TREND}" "${TUNING_PHASE_MARKER}" "${RUN_SUMMARY_HF_TUNING_PHASE}" "${TUNING_ADVICE_MARKER}" "${RUN_SUMMARY_HF_TUNING_ADVICE}" "${FREEZE_MARKER}" "${RUN_SUMMARY_HF_FREEZE}" "${PAYLOAD_PROBE_MARKER}" "${RUN_SUMMARY_HF_PAYLOAD_PROBE}" "${ALERT_MARKER}" "${RUN_SUMMARY_HF_ALERT}" "${LIVE_PROMOTION_MARKER}" "${RUN_SUMMARY_HF_LIVE_PROMOTION}" "${NEXT_ACTION_MARKER}" "${RUN_SUMMARY_HF_NEXT_ACTION}" "${DAILY_VERDICT_MARKER}" "${RUN_SUMMARY_HF_DAILY_VERDICT}" "${PAYLOAD_PATH_STICKY_MARKER}" "${RUN_SUMMARY_HF_PAYLOAD_PATH_STICKY}" "${EVIDENCE_MARKER}" "${RUN_SUMMARY_HF_EVIDENCE}" "${LOG_PATH}" "${RUN_EVENT}" <<'NODE'
          const fs = require("node:fs");
          const [softGate, driftMarker, runSummaryHfDrift, shadowMarker, runSummaryHfShadow, runSummaryHfShadowTrend, tuningPhaseMarker, runSummaryHfTuningPhase, tuningAdviceMarker, runSummaryHfTuningAdvice, freezeMarker, runSummaryHfFreeze, payloadProbeMarker, runSummaryHfPayloadProbe, alertMarker, runSummaryHfAlert, livePromotionMarker, runSummaryHfLivePromotion, nextActionMarker, runSummaryHfNextAction, dailyVerdictMarker, runSummaryHfDailyVerdict, payloadPathStickyMarker, runSummaryHfPayloadPathSticky, evidenceMarker, runSummaryHfEvidence, logPath, runEvent] = process.argv.slice(2);
          const audit = {
            softGate,
            driftMarker,
            runSummaryHfDrift,
            shadowMarker,
            runSummaryHfShadow,
            runSummaryHfShadowTrend,
            tuningPhaseMarker,
            runSummaryHfTuningPhase,
            tuningAdviceMarker,
            runSummaryHfTuningAdvice,
            freezeMarker,
            runSummaryHfFreeze,
            payloadProbeMarker,
            runSummaryHfPayloadProbe,
            alertMarker,
            runSummaryHfAlert,
            livePromotionMarker,
            runSummaryHfLivePromotion,
            nextActionMarker,
            runSummaryHfNextAction,
            dailyVerdictMarker,
            runSummaryHfDailyVerdict,
            payloadPathStickyMarker,
            runSummaryHfPayloadPathSticky,
            evidenceMarker,
            runSummaryHfEvidence,
            logPath,
            runEvent,
            auditedAt: new Date().toISOString(),
          };
          fs.writeFileSync("state/hf-marker-audit.json", `${JSON.stringify(audit, null, 2)}\n`, "utf8");
          const markerFields = [softGate, driftMarker, runSummaryHfDrift, shadowMarker, runSummaryHfShadow, runSummaryHfShadowTrend, tuningPhaseMarker, runSummaryHfTuningPhase, tuningAdviceMarker, runSummaryHfTuningAdvice, freezeMarker, runSummaryHfFreeze, payloadProbeMarker, runSummaryHfPayloadProbe, alertMarker, runSummaryHfAlert, livePromotionMarker, runSummaryHfLivePromotion, nextActionMarker, runSummaryHfNextAction, dailyVerdictMarker, runSummaryHfDailyVerdict, payloadPathStickyMarker, runSummaryHfPayloadPathSticky, evidenceMarker, runSummaryHfEvidence];
          const allowsDedupeNA = String(runEvent || "").toLowerCase() === "dedupe";
          const allOk = markerFields.every((v) => v === "ok" || (allowsDedupeNA && v === "n/a_dedupe"));
          const line =
            `[HF_MARKER_AUDIT] soft=${softGate} drift=${driftMarker} runSummary=${runSummaryHfDrift} shadow=${shadowMarker} runSummaryShadow=${runSummaryHfShadow} runSummaryShadowTrend=${runSummaryHfShadowTrend} tuningPhase=${tuningPhaseMarker} runSummaryTuningPhase=${runSummaryHfTuningPhase} tuningAdvice=${tuningAdviceMarker} runSummaryTuningAdvice=${runSummaryHfTuningAdvice} freeze=${freezeMarker} runSummaryFreeze=${runSummaryHfFreeze} payloadProbe=${payloadProbeMarker} runSummaryPayloadProbe=${runSummaryHfPayloadProbe} alert=${alertMarker} runSummaryAlert=${runSummaryHfAlert} livePromotion=${livePromotionMarker} runSummaryLivePromotion=${runSummaryHfLivePromotion} nextAction=${nextActionMarker} runSummaryNextAction=${runSummaryHfNextAction} dailyVerdict=${dailyVerdictMarker} runSummaryDailyVerdict=${runSummaryHfDailyVerdict} payloadPathSticky=${payloadPathStickyMarker} runSummaryPayloadPathSticky=${runSummaryHfPayloadPathSticky} evidence=${evidenceMarker} runSummaryEvidence=${runSummaryHfEvidence} ` +
            `runEvent=${runEvent || "unknown"} mode=warning-only state=state/hf-marker-audit.json`;
          if (allOk) {
            console.log(line);
          } else {
            console.log(`::warning::${line}`);
          }
          NODE

      - name: Publish run summary
        if: always()
        env:
          SUMMARY_INCLUDE_VALIDATION_PACK: ${{ github.event_name == 'workflow_dispatch' && inputs.validation_pack == 'true' }}
          SUMMARY_INCLUDE_PAYLOAD_PROBE: ${{ github.event_name == 'workflow_dispatch' && inputs.validation_pack != 'true' && inputs.payload_probe == 'true' }}
          SUMMARY_LIFECYCLE_PRESET: ${{ github.event_name == 'workflow_dispatch' && inputs.run_position_lifecycle_action_preset || 'N/A' }}
          SUMMARY_HF_VERIFY_OUTCOME: ${{ steps.hf_verify_gate.outcome || 'skipped' }}
        run: |
          node - <<'NODE'
          const fs = require("node:fs");
          const summaryPath = process.env.GITHUB_STEP_SUMMARY;
          const statePath = "state/last-run.json";
          const previewPath = "state/last-dry-exec-preview.json";
          const hfMarkerAuditPath = "state/hf-marker-audit.json";
          const idempPath = "state/order-idempotency.json";
          const includeValidationPack = String(process.env.SUMMARY_INCLUDE_VALIDATION_PACK || "").trim().toLowerCase() === "true";
          const includePayloadProbe = String(process.env.SUMMARY_INCLUDE_PAYLOAD_PROBE || "").trim().toLowerCase() === "true";
          const tuningSignals = {
            phase: "N/A",
            phaseReason: "N/A",
            phaseRecommendation: "N/A",
            adviceStatus: "N/A",
            adviceAction: "N/A",
            adviceReason: "N/A",
            freezeStatus: "N/A",
            freezeReason: "N/A",
            livePromotionStatus: "N/A",
            livePromotionReason: "N/A",
            livePromotionRecommendation: "N/A",
            payloadProbeStatus: "N/A",
            payloadProbeReason: "N/A",
            markerAuditKnown: false,
            markerAuditOk: false,
            perfGateStatus: "N/A",
            perfGateReason: "N/A",
            perfGateProgress: "N/A"
          };
          const formatCountMap = (raw) => {
            if (!raw || typeof raw !== "object") return "none";
            const entries = Object.entries(raw)
              .map(([k, v]) => [String(k), Number(v)])
              .filter(([k, v]) => k && Number.isFinite(v) && v > 0)
              .sort((a, b) => b[1] - a[1]);
            if (entries.length === 0) return "none";
            return entries.map(([k, v]) => `${k}:${v}`).join(", ");
          };

          const lines = [];
          lines.push("## Sidecar Dry-Run Summary");
          const triggerEvent =
            process.env.WORKFLOW_EVENT_NAME || process.env.GITHUB_EVENT_NAME || "N/A";
          const triggerAction =
            process.env.WORKFLOW_EVENT_ACTION && process.env.WORKFLOW_EVENT_ACTION.trim()
              ? process.env.WORKFLOW_EVENT_ACTION.trim()
              : "N/A";
          lines.push(`- trigger: \`event=${triggerEvent} action=${triggerAction}\``);
          const triggerStage6Hash = (process.env.TRIGGER_STAGE6_HASH || "").trim();
          const triggerStage6File = (process.env.TRIGGER_STAGE6_FILE || "").trim();
          const triggerStage6SourceRun = (process.env.TRIGGER_STAGE6_SOURCE_RUN || "").trim();
          if (triggerStage6Hash || triggerStage6File || triggerStage6SourceRun) {
            lines.push(
              `- trigger_stage6: \`hash=${(triggerStage6Hash || "N/A").slice(0, 12)} file=${triggerStage6File || "N/A"} sourceRun=${triggerStage6SourceRun || "N/A"}\``
            );
          }
          lines.push(
            `- manual_effective: \`event=${triggerEvent} lifecycle_preset=${process.env.SUMMARY_LIFECYCLE_PRESET ?? "N/A"} lifecycle_enabled=${process.env.POSITION_LIFECYCLE_ENABLED ?? "N/A"} lifecycle_preview_only=${process.env.POSITION_LIFECYCLE_PREVIEW_ONLY ?? "N/A"} lifecycle_actions=${process.env.POSITION_LIFECYCLE_ACTION_TYPES ?? "N/A"} allow_entry_outside_rth=${process.env.ALLOW_ENTRY_OUTSIDE_RTH ?? "N/A"} include_speculative=${process.env.ACTIONABLE_INCLUDE_SPECULATIVE_BUY ?? "N/A"} force_send_once=${process.env.FORCE_SEND_ONCE ?? "N/A"}\``
          );
          const hfVerifyOutcome = String(process.env.SUMMARY_HF_VERIFY_OUTCOME || "skipped").trim() || "skipped";
          const hfVerifyMode = includeValidationPack ? "required" : "optional";
          lines.push(`- hf_verify_gate: \`outcome=${hfVerifyOutcome} mode=${hfVerifyMode}\``);

          if (fs.existsSync(statePath)) {
            const state = JSON.parse(fs.readFileSync(statePath, "utf8"));
            lines.push(`- lastSentAt: \`${state.lastSentAt || "N/A"}\``);
            lines.push(`- last_sent_stage6File: \`${state.lastStage6FileName || "N/A"}\``);
            lines.push(`- last_sent_stage6Hash: \`${(state.lastStage6Sha256 || "").slice(0, 12) || "N/A"}\``);
          } else {
            lines.push("- state/last-run.json: not found");
          }

          if (fs.existsSync(previewPath)) {
            const preview = JSON.parse(fs.readFileSync(previewPath, "utf8"));
            lines.push(`- stage6File: \`${preview.stage6File || "N/A"}\``);
            lines.push(`- stage6Hash: \`${(preview.stage6Hash || "").slice(0, 12) || "N/A"}\``);
            const regime = preview?.regime?.profile || "N/A";
            const source = preview?.regime?.source || "N/A";
            const vix = Number.isFinite(preview?.regime?.vix) ? preview.regime.vix.toFixed(2) : "N/A";
            lines.push(`- regime: \`${regime}\` (source=${source}, vix=${vix})`);
            const quality = preview?.regime?.quality || {};
            const hysteresis = preview?.regime?.hysteresis || {};
            const entryGuard = preview?.regime?.entryGuard || {};
            lines.push(
              `- regime_guard: \`quality=${quality.status ?? "N/A"}(${quality.score ?? "N/A"}/${quality.minScore ?? "N/A"}) force=${quality.forceRiskOff ?? "N/A"} hysteresis=${hysteresis.reason ?? "N/A"} hold=${hysteresis.holdRemainingMin ?? "N/A"} blocked=${entryGuard.blocked ?? "N/A"}\``
            );
            lines.push(
              `- payloads/skipped: \`${preview.payloadCount ?? 0}/${preview.skippedCount ?? 0}\``
            );
