name: sidecar-dry-run

on:
  workflow_dispatch:
    inputs:
      run_force_send_once:
        description: "Force send once for current stage6Hash+mode (manual run only)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      run_allow_entry_outside_rth:
        description: "Allow entry outside RTH for this manual run only"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      run_actionable_include_speculative_buy:
        description: "Include SPECULATIVE_BUY in actionable verdicts for this manual run"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      run_position_lifecycle_enabled:
        description: "Enable position lifecycle action-intent scaffold for this manual run"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      run_position_lifecycle_preview_only:
        description: "Keep lifecycle scaffold preview-only (no behavior change)"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      run_position_lifecycle_action_preset:
        description: "Lifecycle action types preset"
        required: false
        default: "ENTRY_AND_HOLD"
        type: choice
        options:
          - "ENTRY_AND_HOLD"
          - "ENTRY_ONLY"
          - "ALL"
          - "CUSTOM"
      run_position_lifecycle_action_types_override:
        description: "Lifecycle action types when preset=CUSTOM (comma-separated)"
        required: false
        default: ""
        type: string
      validation_pack:
        description: "Run OFF/ON/STRICT entry feasibility checks in one workflow run"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      payload_probe:
        description: "Run one-shot payload path probe (temporary risk-off conviction override)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      payload_probe_min_conviction:
        description: "Temporary DRY_RISK_OFF_MIN_CONVICTION for payload probe"
        required: false
        default: "30"
        type: choice
        options:
          - "20"
          - "30"
          - "40"
          - "50"
  schedule:
    # Weekday fallback run (UTC): keep low-frequency to avoid duplicate spend with dispatch-driven runs.
    - cron: "15 10 * * 1-5"
  repository_dispatch:
    types:
      - stage6_result_created

concurrency:
  group: sidecar-dry-run-${{ github.ref }}
  cancel-in-progress: false

jobs:
  dry-run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      EXEC_ENABLED: ${{ vars.EXEC_ENABLED }}
      READ_ONLY: ${{ vars.READ_ONLY }}
      SIMULATION_LIVE_PARITY: ${{ vars.SIMULATION_LIVE_PARITY }}
      POLICY_VERSION: stage6-exec-v1.0-rc1
      TZ: ${{ vars.TZ }}
      DRY_NOTIONAL_PER_TRADE: ${{ vars.DRY_NOTIONAL_PER_TRADE }}
      DRY_MAX_ORDERS: ${{ vars.DRY_MAX_ORDERS }}
      DRY_MAX_TOTAL_NOTIONAL: ${{ vars.DRY_MAX_TOTAL_NOTIONAL }}
      DRY_MIN_CONVICTION: ${{ vars.DRY_MIN_CONVICTION }}
      DRY_MIN_STOP_DISTANCE_PCT: ${{ vars.DRY_MIN_STOP_DISTANCE_PCT }}
      DRY_MAX_STOP_DISTANCE_PCT: ${{ vars.DRY_MAX_STOP_DISTANCE_PCT }}
      ENTRY_FEASIBILITY_ENFORCE: ${{ vars.ENTRY_FEASIBILITY_ENFORCE }}
      ENTRY_MAX_DISTANCE_PCT: ${{ vars.ENTRY_MAX_DISTANCE_PCT }}
      STAGE6_EXECUTION_BUCKET_ENFORCE: ${{ vars.STAGE6_EXECUTION_BUCKET_ENFORCE }}
      ACTIONABLE_INCLUDE_SPECULATIVE_BUY: ${{ github.event_name == 'workflow_dispatch' && inputs.run_actionable_include_speculative_buy || vars.ACTIONABLE_INCLUDE_SPECULATIVE_BUY }}
      ORDER_IDEMPOTENCY_ENABLED: ${{ vars.ORDER_IDEMPOTENCY_ENABLED }}
      ORDER_IDEMPOTENCY_ENFORCE_DRY_RUN: ${{ vars.ORDER_IDEMPOTENCY_ENFORCE_DRY_RUN }}
      ORDER_IDEMPOTENCY_TTL_DAYS: ${{ vars.ORDER_IDEMPOTENCY_TTL_DAYS }}
      PREFLIGHT_ENABLED: ${{ vars.PREFLIGHT_ENABLED }}
      DAILY_MAX_NOTIONAL: ${{ vars.DAILY_MAX_NOTIONAL }}
      ALLOW_ENTRY_OUTSIDE_RTH: ${{ github.event_name == 'workflow_dispatch' && inputs.run_allow_entry_outside_rth || vars.ALLOW_ENTRY_OUTSIDE_RTH }}
      ORDER_LIFECYCLE_ENABLED: ${{ vars.ORDER_LIFECYCLE_ENABLED }}
      ORDER_LEDGER_TTL_DAYS: ${{ vars.ORDER_LEDGER_TTL_DAYS }}
      FORCE_SEND_ONCE: ${{ github.event_name == 'workflow_dispatch' && inputs.run_force_send_once || vars.FORCE_SEND_ONCE }}
      TELEGRAM_HEARTBEAT_ON_DEDUPE: ${{ vars.TELEGRAM_HEARTBEAT_ON_DEDUPE }}
      TELEGRAM_MAX_MESSAGE_LENGTH: ${{ vars.TELEGRAM_MAX_MESSAGE_LENGTH }}
      POSITION_LIFECYCLE_ENABLED: ${{ github.event_name == 'workflow_dispatch' && inputs.run_position_lifecycle_enabled || vars.POSITION_LIFECYCLE_ENABLED }}
      POSITION_LIFECYCLE_PREVIEW_ONLY: ${{ github.event_name == 'workflow_dispatch' && inputs.run_position_lifecycle_preview_only || vars.POSITION_LIFECYCLE_PREVIEW_ONLY }}
      POSITION_LIFECYCLE_ACTION_TYPES: ${{ vars.POSITION_LIFECYCLE_ACTION_TYPES }}
      POSITION_LIFECYCLE_SCALE_UP_MIN_CONVICTION: ${{ vars.POSITION_LIFECYCLE_SCALE_UP_MIN_CONVICTION }}
      HF_SENTIMENT_SOFT_GATE_ENABLED: ${{ vars.HF_SENTIMENT_SOFT_GATE_ENABLED }}
      HF_SENTIMENT_SCORE_FLOOR: ${{ vars.HF_SENTIMENT_SCORE_FLOOR }}
      HF_SENTIMENT_MIN_ARTICLE_COUNT: ${{ vars.HF_SENTIMENT_MIN_ARTICLE_COUNT }}
      HF_SENTIMENT_MAX_NEWS_AGE_HOURS: ${{ vars.HF_SENTIMENT_MAX_NEWS_AGE_HOURS }}
      HF_EARNINGS_WINDOW_ENABLED: ${{ vars.HF_EARNINGS_WINDOW_ENABLED }}
      HF_EARNINGS_WINDOW_BLOCK_DAYS: ${{ vars.HF_EARNINGS_WINDOW_BLOCK_DAYS }}
      HF_EARNINGS_WINDOW_REDUCE_DAYS: ${{ vars.HF_EARNINGS_WINDOW_REDUCE_DAYS }}
      HF_EARNINGS_WINDOW_REDUCE_FACTOR: ${{ vars.HF_EARNINGS_WINDOW_REDUCE_FACTOR }}
      HF_SENTIMENT_POSITIVE_RELIEF_MAX: ${{ vars.HF_SENTIMENT_POSITIVE_RELIEF_MAX }}
      HF_SENTIMENT_NEGATIVE_TIGHTEN_MAX: ${{ vars.HF_SENTIMENT_NEGATIVE_TIGHTEN_MAX }}
      HF_NEGATIVE_SIZE_REDUCTION_ENABLED: ${{ vars.HF_NEGATIVE_SIZE_REDUCTION_ENABLED }}
      HF_NEGATIVE_SIZE_REDUCTION_PCT: ${{ vars.HF_NEGATIVE_SIZE_REDUCTION_PCT }}
      HF_SHADOW_ENABLED: ${{ vars.HF_SHADOW_ENABLED }}
      HF_ALERT_ENABLED: ${{ vars.HF_ALERT_ENABLED }}
      HF_ALERT_SHADOW_PAYLOAD_DELTA_ABS: ${{ vars.HF_ALERT_SHADOW_PAYLOAD_DELTA_ABS }}
      HF_ALERT_SHADOW_NOTIONAL_DELTA_ABS: ${{ vars.HF_ALERT_SHADOW_NOTIONAL_DELTA_ABS }}
      HF_ALERT_SHADOW_SKIPPED_DELTA_ABS: ${{ vars.HF_ALERT_SHADOW_SKIPPED_DELTA_ABS }}
      HF_DRIFT_ALERT_ENABLED: ${{ vars.HF_DRIFT_ALERT_ENABLED }}
      HF_DRIFT_ALERT_WINDOW_RUNS: ${{ vars.HF_DRIFT_ALERT_WINDOW_RUNS }}
      HF_DRIFT_ALERT_MIN_HISTORY: ${{ vars.HF_DRIFT_ALERT_MIN_HISTORY }}
      HF_DRIFT_ALERT_MIN_CANDIDATES: ${{ vars.HF_DRIFT_ALERT_MIN_CANDIDATES }}
      HF_DRIFT_ALERT_NEGATIVE_RATIO_SPIKE: ${{ vars.HF_DRIFT_ALERT_NEGATIVE_RATIO_SPIKE }}
      HF_DRIFT_ALERT_NEGATIVE_RATIO_DELTA: ${{ vars.HF_DRIFT_ALERT_NEGATIVE_RATIO_DELTA }}
      HF_DRIFT_ALERT_APPLIED_RATIO_DROP: ${{ vars.HF_DRIFT_ALERT_APPLIED_RATIO_DROP }}
      HF_DRIFT_ALERT_APPLIED_RATIO_FLOOR: ${{ vars.HF_DRIFT_ALERT_APPLIED_RATIO_FLOOR }}
      REGIME_AUTO_ENABLED: ${{ vars.REGIME_AUTO_ENABLED }}
      REGIME_FORCE_PROFILE: ${{ vars.REGIME_FORCE_PROFILE }}
      REGIME_VIX_SOURCE_PRIORITY: ${{ vars.REGIME_VIX_SOURCE_PRIORITY }}
      REGIME_SNAPSHOT_MAX_AGE_MIN: ${{ vars.REGIME_SNAPSHOT_MAX_AGE_MIN }}
      REGIME_QUALITY_GUARD_ENABLED: ${{ vars.REGIME_QUALITY_GUARD_ENABLED }}
      REGIME_QUALITY_MIN_SCORE: ${{ vars.REGIME_QUALITY_MIN_SCORE }}
      REGIME_HYSTERESIS_ENABLED: ${{ vars.REGIME_HYSTERESIS_ENABLED }}
      REGIME_MIN_HOLD_MIN: ${{ vars.REGIME_MIN_HOLD_MIN }}
      REGIME_VIX_MISMATCH_PCT: ${{ vars.REGIME_VIX_MISMATCH_PCT }}
      GUARD_CONTROL_ENFORCE: ${{ vars.GUARD_CONTROL_ENFORCE }}
      GUARD_CONTROL_MAX_AGE_MIN: ${{ vars.GUARD_CONTROL_MAX_AGE_MIN }}
      GUARD_QUALITY_MIN_SCORE: ${{ vars.GUARD_QUALITY_MIN_SCORE }}
      VIX_RISK_ON_THRESHOLD: ${{ vars.VIX_RISK_ON_THRESHOLD }}
      VIX_RISK_OFF_THRESHOLD: ${{ vars.VIX_RISK_OFF_THRESHOLD }}
      DRY_STOP_DISTANCE_STAGE6_SYNC: ${{ vars.DRY_STOP_DISTANCE_STAGE6_SYNC }}
      VITE_STAGE6_MIN_STOP_DISTANCE_PCT: ${{ vars.VITE_STAGE6_MIN_STOP_DISTANCE_PCT }}
      VITE_STAGE6_MAX_STOP_DISTANCE_PCT: ${{ vars.VITE_STAGE6_MAX_STOP_DISTANCE_PCT }}

      DRY_DEFAULT_NOTIONAL_PER_TRADE: ${{ vars.DRY_DEFAULT_NOTIONAL_PER_TRADE }}
      DRY_DEFAULT_MAX_ORDERS: ${{ vars.DRY_DEFAULT_MAX_ORDERS }}
      DRY_DEFAULT_MAX_TOTAL_NOTIONAL: ${{ vars.DRY_DEFAULT_MAX_TOTAL_NOTIONAL }}
      DRY_DEFAULT_MIN_CONVICTION: ${{ vars.DRY_DEFAULT_MIN_CONVICTION }}
      DRY_DEFAULT_MIN_CONVICTION_FLOOR: ${{ vars.DRY_DEFAULT_MIN_CONVICTION_FLOOR }}
      DRY_DEFAULT_MIN_CONVICTION_CEILING: ${{ vars.DRY_DEFAULT_MIN_CONVICTION_CEILING }}
      DRY_DEFAULT_MIN_STOP_DISTANCE_PCT: ${{ vars.DRY_DEFAULT_MIN_STOP_DISTANCE_PCT }}
      DRY_DEFAULT_MAX_STOP_DISTANCE_PCT: ${{ vars.DRY_DEFAULT_MAX_STOP_DISTANCE_PCT }}

      DRY_RISK_OFF_NOTIONAL_PER_TRADE: ${{ vars.DRY_RISK_OFF_NOTIONAL_PER_TRADE }}
      DRY_RISK_OFF_MAX_ORDERS: ${{ vars.DRY_RISK_OFF_MAX_ORDERS }}
      DRY_RISK_OFF_MAX_TOTAL_NOTIONAL: ${{ vars.DRY_RISK_OFF_MAX_TOTAL_NOTIONAL }}
      DRY_RISK_OFF_MIN_CONVICTION: ${{ vars.DRY_RISK_OFF_MIN_CONVICTION }}
      DRY_RISK_OFF_MIN_CONVICTION_FLOOR: ${{ vars.DRY_RISK_OFF_MIN_CONVICTION_FLOOR }}
      DRY_RISK_OFF_MIN_CONVICTION_CEILING: ${{ vars.DRY_RISK_OFF_MIN_CONVICTION_CEILING }}
      DRY_RISK_OFF_MIN_STOP_DISTANCE_PCT: ${{ vars.DRY_RISK_OFF_MIN_STOP_DISTANCE_PCT }}
      DRY_RISK_OFF_MAX_STOP_DISTANCE_PCT: ${{ vars.DRY_RISK_OFF_MAX_STOP_DISTANCE_PCT }}

      ALPACA_KEY_ID: ${{ secrets.ALPACA_KEY_ID }}
      ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
      ALPACA_BASE_URL: ${{ vars.ALPACA_BASE_URL }}

      GDRIVE_CLIENT_ID: ${{ secrets.GDRIVE_CLIENT_ID }}
      GDRIVE_CLIENT_SECRET: ${{ secrets.GDRIVE_CLIENT_SECRET }}
      GDRIVE_REFRESH_TOKEN: ${{ secrets.GDRIVE_REFRESH_TOKEN }}
      FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
      CNBC_RAPIDAPI_ENABLED: ${{ vars.CNBC_RAPIDAPI_ENABLED }}
      CNBC_RAPIDAPI_KEY: ${{ secrets.CNBC_RAPIDAPI_KEY }}
      RAPID_API_KEY: ${{ secrets.RAPID_API_KEY }}
      CNBC_RAPIDAPI_HOST: ${{ vars.CNBC_RAPIDAPI_HOST }}
      CNBC_RAPIDAPI_ENDPOINT: ${{ vars.CNBC_RAPIDAPI_ENDPOINT }}
      CNBC_RAPIDAPI_SYMBOL_PARAM: ${{ vars.CNBC_RAPIDAPI_SYMBOL_PARAM }}
      GDRIVE_ROOT_FOLDER_ID: ${{ vars.GDRIVE_ROOT_FOLDER_ID }}
      GDRIVE_MARKET_SNAPSHOT_FOLDER_ID: ${{ vars.GDRIVE_MARKET_SNAPSHOT_FOLDER_ID }}
      GDRIVE_STAGE6_FOLDER: ${{ vars.GDRIVE_STAGE6_FOLDER }}
      GDRIVE_REPORT_FOLDER: ${{ vars.GDRIVE_REPORT_FOLDER }}

      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_PRIMARY_CHAT_ID: ${{ vars.TELEGRAM_PRIMARY_CHAT_ID }}
      TELEGRAM_SIMULATION_CHAT_ID: ${{ vars.TELEGRAM_SIMULATION_CHAT_ID }}
      WORKFLOW_EVENT_NAME: ${{ github.event_name }}
      WORKFLOW_EVENT_ACTION: ${{ github.event.action || '' }}
      TRIGGER_STAGE6_HASH: ${{ github.event.client_payload.stage6Hash || github.event.client_payload.stage6_hash || '' }}
      TRIGGER_STAGE6_FILE: ${{ github.event.client_payload.stage6File || github.event.client_payload.stage6_file || '' }}
      TRIGGER_STAGE6_SOURCE_RUN: ${{ github.event.client_payload.sourceRunId || github.event.client_payload.source_run_id || '' }}

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"

      - name: Restore sidecar state
        id: restore_state
        uses: actions/cache/restore@v5
        with:
          path: state
          key: sidecar-state-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            sidecar-state-${{ github.ref_name }}-

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Refresh market guard state
        run: npm run guard

      - name: Trigger context
        run: |
          echo "[TRIGGER] event=${WORKFLOW_EVENT_NAME} action=${WORKFLOW_EVENT_ACTION:-n/a}"
          echo "[TRIGGER] stage6Hash=${TRIGGER_STAGE6_HASH:-n/a} stage6File=${TRIGGER_STAGE6_FILE:-n/a} sourceRun=${TRIGGER_STAGE6_SOURCE_RUN:-n/a}"

      - name: Resolve lifecycle action types (manual)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          RUN_LIFECYCLE_ACTION_PRESET: ${{ inputs.run_position_lifecycle_action_preset }}
          RUN_LIFECYCLE_ACTION_OVERRIDE: ${{ inputs.run_position_lifecycle_action_types_override }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os
          import sys

          preset = (os.getenv("RUN_LIFECYCLE_ACTION_PRESET") or "").strip().upper()
          override_raw = os.getenv("RUN_LIFECYCLE_ACTION_OVERRIDE") or ""
          allowed = [
              "ENTRY_NEW",
              "HOLD_WAIT",
              "SCALE_UP",
              "SCALE_DOWN",
              "EXIT_PARTIAL",
              "EXIT_FULL",
          ]

          preset_map = {
              "ENTRY_AND_HOLD": "ENTRY_NEW,HOLD_WAIT",
              "ENTRY_ONLY": "ENTRY_NEW",
              "ALL": ",".join(allowed),
              "CUSTOM": override_raw,
          }
          if preset not in preset_map:
              print(f"::error::Unknown run_position_lifecycle_action_preset: {preset or 'EMPTY'}")
              sys.exit(1)

          raw = preset_map[preset]
          tokens = [t.strip().upper() for t in raw.split(",") if t.strip()]
          if not tokens:
              print("::error::Resolved lifecycle action types are empty.")
              if preset == "CUSTOM":
                  print("::error::Set run_position_lifecycle_action_types_override when preset=CUSTOM.")
              sys.exit(1)

          invalid = [t for t in tokens if t not in allowed]
          if invalid:
              print(f"::error::Invalid lifecycle action type(s): {', '.join(invalid)}")
              print(f"::error::Allowed values: {', '.join(allowed)}")
              sys.exit(1)

          deduped = list(dict.fromkeys(tokens))
          resolved = ",".join(deduped)
          print(f"[LIFECYCLE_ACTION_PRESET] preset={preset} resolved={resolved}")

          github_env = os.getenv("GITHUB_ENV")
          if not github_env:
              print("::error::GITHUB_ENV not found.")
              sys.exit(1)
          with open(github_env, "a", encoding="utf-8") as f:
              f.write(f"POSITION_LIFECYCLE_ACTION_TYPES={resolved}\n")
          PY

      - name: Run dry-run bootstrap
        if: ${{ !(github.event_name == 'workflow_dispatch' && (inputs.validation_pack == 'true' || inputs.payload_probe == 'true')) }}
        run: |
          set -euo pipefail
          mkdir -p state
          : > state/last-run-output.log
          node dist/src/index.js 2>&1 | tee -a state/last-run-output.log

      - name: Run validation pack (OFF/ON/STRICT)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.validation_pack == 'true' }}
        run: |
          set -euo pipefail
          mkdir -p state/validation-pack/off state/validation-pack/on state/validation-pack/strict
          : > state/last-run-output.log

          echo "[PACK] OFF: ENTRY_FEASIBILITY_ENFORCE=false, ENTRY_MAX_DISTANCE_PCT=15"
          ENTRY_FEASIBILITY_ENFORCE=false ENTRY_MAX_DISTANCE_PCT=15 FORCE_SEND_ONCE=true node dist/src/index.js 2>&1 | tee -a state/last-run-output.log
          cp state/last-run.json state/validation-pack/off/last-run.json
          cp state/last-dry-exec-preview.json state/validation-pack/off/last-dry-exec-preview.json

          echo "[PACK] ON: ENTRY_FEASIBILITY_ENFORCE=true, ENTRY_MAX_DISTANCE_PCT=15"
          ENTRY_FEASIBILITY_ENFORCE=true ENTRY_MAX_DISTANCE_PCT=15 FORCE_SEND_ONCE=true node dist/src/index.js 2>&1 | tee -a state/last-run-output.log
          cp state/last-run.json state/validation-pack/on/last-run.json
          cp state/last-dry-exec-preview.json state/validation-pack/on/last-dry-exec-preview.json

          echo "[PACK] STRICT: ENTRY_FEASIBILITY_ENFORCE=true, ENTRY_MAX_DISTANCE_PCT=1"
          ENTRY_FEASIBILITY_ENFORCE=true ENTRY_MAX_DISTANCE_PCT=1 FORCE_SEND_ONCE=true node dist/src/index.js 2>&1 | tee -a state/last-run-output.log
          cp state/last-run.json state/validation-pack/strict/last-run.json
          cp state/last-dry-exec-preview.json state/validation-pack/strict/last-dry-exec-preview.json

      - name: Run payload path probe (one-shot)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.validation_pack != 'true' && inputs.payload_probe == 'true' }}
        run: |
          set -euo pipefail
          mkdir -p state/payload-probe
          : > state/last-run-output.log
          PROBE_MIN_CONV="${{ inputs.payload_probe_min_conviction }}"
          echo "[PROBE] payload path with DRY_RISK_OFF_MIN_CONVICTION=${PROBE_MIN_CONV}"
          DRY_RISK_OFF_MIN_CONVICTION="${PROBE_MIN_CONV}" FORCE_SEND_ONCE=true node dist/src/index.js 2>&1 | tee -a state/last-run-output.log
          cp state/last-run.json state/payload-probe/last-run.json
          cp state/last-dry-exec-preview.json state/payload-probe/last-dry-exec-preview.json

      - name: HF marker audit (warning-only)
        if: always()
        run: |
          set -euo pipefail
          mkdir -p state
          LOG_PATH="state/last-run-output.log"
          SOFT_GATE="missing"
          DRIFT_MARKER="missing"
          RUN_SUMMARY_HF_DRIFT="missing"
          SHADOW_MARKER="missing"
          RUN_SUMMARY_HF_SHADOW="missing"
          RUN_SUMMARY_HF_SHADOW_TREND="missing"
          ALERT_MARKER="missing"
          RUN_SUMMARY_HF_ALERT="missing"

          if [[ -f "${LOG_PATH}" ]]; then
            grep -q '\[HF_SOFT_GATE\]' "${LOG_PATH}" && SOFT_GATE="ok" || true
            grep -Eq '\[HF_DRIFT\]|\[HF_DRIFT_SUMMARY\]' "${LOG_PATH}" && DRIFT_MARKER="ok" || true
            grep -Eq '\[RUN_SUMMARY\].*hf_drift=' "${LOG_PATH}" && RUN_SUMMARY_HF_DRIFT="ok" || true
            grep -q '\[HF_SHADOW\]' "${LOG_PATH}" && SHADOW_MARKER="ok" || true
            grep -Eq '\[RUN_SUMMARY\].*hf_shadow=' "${LOG_PATH}" && RUN_SUMMARY_HF_SHADOW="ok" || true
            grep -Eq '\[RUN_SUMMARY\].*hf_shadow_trend=' "${LOG_PATH}" && RUN_SUMMARY_HF_SHADOW_TREND="ok" || true
            grep -Eq '\[HF_ALERT\]|\[HF_ALERT_SUMMARY\]' "${LOG_PATH}" && ALERT_MARKER="ok" || true
            grep -Eq '\[RUN_SUMMARY\].*hf_alert=' "${LOG_PATH}" && RUN_SUMMARY_HF_ALERT="ok" || true
          fi

          node - "${SOFT_GATE}" "${DRIFT_MARKER}" "${RUN_SUMMARY_HF_DRIFT}" "${SHADOW_MARKER}" "${RUN_SUMMARY_HF_SHADOW}" "${RUN_SUMMARY_HF_SHADOW_TREND}" "${ALERT_MARKER}" "${RUN_SUMMARY_HF_ALERT}" "${LOG_PATH}" <<'NODE'
          const fs = require("node:fs");
          const [softGate, driftMarker, runSummaryHfDrift, shadowMarker, runSummaryHfShadow, runSummaryHfShadowTrend, alertMarker, runSummaryHfAlert, logPath] = process.argv.slice(2);
          const audit = {
            softGate,
            driftMarker,
            runSummaryHfDrift,
            shadowMarker,
            runSummaryHfShadow,
            runSummaryHfShadowTrend,
            alertMarker,
            runSummaryHfAlert,
            logPath,
            auditedAt: new Date().toISOString(),
          };
          fs.writeFileSync("state/hf-marker-audit.json", `${JSON.stringify(audit, null, 2)}\n`, "utf8");
          const allOk = [softGate, driftMarker, runSummaryHfDrift, shadowMarker, runSummaryHfShadow, runSummaryHfShadowTrend, alertMarker, runSummaryHfAlert].every((v) => v === "ok");
          const line =
            `[HF_MARKER_AUDIT] soft=${softGate} drift=${driftMarker} runSummary=${runSummaryHfDrift} shadow=${shadowMarker} runSummaryShadow=${runSummaryHfShadow} runSummaryShadowTrend=${runSummaryHfShadowTrend} alert=${alertMarker} runSummaryAlert=${runSummaryHfAlert} ` +
            `mode=warning-only state=state/hf-marker-audit.json`;
          if (allOk) {
            console.log(line);
          } else {
            console.log(`::warning::${line}`);
          }
          NODE

      - name: Publish run summary
        if: always()
        env:
          SUMMARY_INCLUDE_VALIDATION_PACK: ${{ github.event_name == 'workflow_dispatch' && inputs.validation_pack == 'true' }}
          SUMMARY_INCLUDE_PAYLOAD_PROBE: ${{ github.event_name == 'workflow_dispatch' && inputs.validation_pack != 'true' && inputs.payload_probe == 'true' }}
          SUMMARY_LIFECYCLE_PRESET: ${{ github.event_name == 'workflow_dispatch' && inputs.run_position_lifecycle_action_preset || 'N/A' }}
        run: |
          node - <<'NODE'
          const fs = require("node:fs");
          const summaryPath = process.env.GITHUB_STEP_SUMMARY;
          const statePath = "state/last-run.json";
          const previewPath = "state/last-dry-exec-preview.json";
          const hfMarkerAuditPath = "state/hf-marker-audit.json";
          const idempPath = "state/order-idempotency.json";
          const includeValidationPack = String(process.env.SUMMARY_INCLUDE_VALIDATION_PACK || "").trim().toLowerCase() === "true";
          const includePayloadProbe = String(process.env.SUMMARY_INCLUDE_PAYLOAD_PROBE || "").trim().toLowerCase() === "true";

          const lines = [];
          lines.push("## Sidecar Dry-Run Summary");
          const triggerEvent =
            process.env.WORKFLOW_EVENT_NAME || process.env.GITHUB_EVENT_NAME || "N/A";
          const triggerAction =
            process.env.WORKFLOW_EVENT_ACTION && process.env.WORKFLOW_EVENT_ACTION.trim()
              ? process.env.WORKFLOW_EVENT_ACTION.trim()
              : "N/A";
          lines.push(`- trigger: \`event=${triggerEvent} action=${triggerAction}\``);
          const triggerStage6Hash = (process.env.TRIGGER_STAGE6_HASH || "").trim();
          const triggerStage6File = (process.env.TRIGGER_STAGE6_FILE || "").trim();
          const triggerStage6SourceRun = (process.env.TRIGGER_STAGE6_SOURCE_RUN || "").trim();
          if (triggerStage6Hash || triggerStage6File || triggerStage6SourceRun) {
            lines.push(
              `- trigger_stage6: \`hash=${(triggerStage6Hash || "N/A").slice(0, 12)} file=${triggerStage6File || "N/A"} sourceRun=${triggerStage6SourceRun || "N/A"}\``
            );
          }
          lines.push(
            `- manual_effective: \`event=${triggerEvent} lifecycle_preset=${process.env.SUMMARY_LIFECYCLE_PRESET ?? "N/A"} lifecycle_enabled=${process.env.POSITION_LIFECYCLE_ENABLED ?? "N/A"} lifecycle_preview_only=${process.env.POSITION_LIFECYCLE_PREVIEW_ONLY ?? "N/A"} lifecycle_actions=${process.env.POSITION_LIFECYCLE_ACTION_TYPES ?? "N/A"} allow_entry_outside_rth=${process.env.ALLOW_ENTRY_OUTSIDE_RTH ?? "N/A"} include_speculative=${process.env.ACTIONABLE_INCLUDE_SPECULATIVE_BUY ?? "N/A"} force_send_once=${process.env.FORCE_SEND_ONCE ?? "N/A"}\``
          );

          if (fs.existsSync(statePath)) {
            const state = JSON.parse(fs.readFileSync(statePath, "utf8"));
            lines.push(`- lastSentAt: \`${state.lastSentAt || "N/A"}\``);
            lines.push(`- stage6File: \`${state.lastStage6FileName || "N/A"}\``);
            lines.push(`- stage6Hash: \`${(state.lastStage6Sha256 || "").slice(0, 12) || "N/A"}\``);
          } else {
            lines.push("- state/last-run.json: not found");
          }

          if (fs.existsSync(previewPath)) {
            const preview = JSON.parse(fs.readFileSync(previewPath, "utf8"));
            const regime = preview?.regime?.profile || "N/A";
            const source = preview?.regime?.source || "N/A";
            const vix = Number.isFinite(preview?.regime?.vix) ? preview.regime.vix.toFixed(2) : "N/A";
            lines.push(`- regime: \`${regime}\` (source=${source}, vix=${vix})`);
            const quality = preview?.regime?.quality || {};
            const hysteresis = preview?.regime?.hysteresis || {};
            const entryGuard = preview?.regime?.entryGuard || {};
            lines.push(
              `- regime_guard: \`quality=${quality.status ?? "N/A"}(${quality.score ?? "N/A"}/${quality.minScore ?? "N/A"}) force=${quality.forceRiskOff ?? "N/A"} hysteresis=${hysteresis.reason ?? "N/A"} hold=${hysteresis.holdRemainingMin ?? "N/A"} blocked=${entryGuard.blocked ?? "N/A"}\``
            );
            lines.push(
              `- payloads/skipped: \`${preview.payloadCount ?? 0}/${preview.skippedCount ?? 0}\``
            );
            const entryFeasibility = preview?.entryFeasibility || {};
            lines.push(
              `- entry_feasibility: \`enforce=${entryFeasibility.enforce ?? "N/A"} maxDistancePct=${entryFeasibility.maxDistancePct ?? "N/A"} checked=${entryFeasibility.checked ?? "N/A"} blocked=${entryFeasibility.blocked ?? "N/A"}\``
            );
            const stage6Contract = preview?.stage6Contract || {};
            lines.push(
              `- stage6_contract: \`enforce=${stage6Contract.enforce ?? "N/A"} checked=${stage6Contract.checked ?? "N/A"} executable=${stage6Contract.executable ?? "N/A"} watchlist=${stage6Contract.watchlist ?? "N/A"} blocked=${stage6Contract.blocked ?? "N/A"}\``
            );
            const hfGate = preview?.hfSentimentGate || {};
            lines.push(
              `- hf_soft_gate: \`enabled=${hfGate.enabled ?? "N/A"} applied=${hfGate.applied ?? "N/A"} netDelta=${hfGate.netMinConvictionDelta ?? "N/A"} earningsBlocked=${hfGate.earningsBlocked ?? "N/A"} earningsReduced=${hfGate.earningsReduced ?? "N/A"} sizeReduceEnabled=${hfGate.sizeReductionEnabled ?? "N/A"} sizeReducePct=${hfGate.sizeReductionPct ?? "N/A"} sizeReduced=${hfGate.sizeReducedCount ?? "N/A"} sizeSavedNotional=${hfGate.sizeReductionNotionalTotal ?? "N/A"} explain=${hfGate.explainLine ?? "N/A"}\``
            );
            const hfShadow = preview?.hfShadow || {};
            lines.push(
              `- hf_shadow: \`enabled=${hfShadow.enabled ?? "N/A"} compared=${hfShadow.compared ?? "N/A"} reason=${hfShadow.reason ?? "N/A"} payloadDelta=${hfShadow.payloadDelta ?? "N/A"} notionalDelta=${hfShadow.notionalDelta ?? "N/A"} onOnly=${Array.isArray(hfShadow.onOnlySymbols) ? hfShadow.onOnlySymbols.length : "N/A"} offOnly=${Array.isArray(hfShadow.offOnlySymbols) ? hfShadow.offOnlySymbols.length : "N/A"} skipReasonDelta=${hfShadow.skipReasonDelta ?? "N/A"}\``
            );
            const hfShadowTrend = preview?.hfShadowTrend || {};
            lines.push(
              `- hf_shadow_trend: \`history=${hfShadowTrend.historySize ?? "N/A"} window=${hfShadowTrend.windowSize ?? "N/A"} compared=${hfShadowTrend.comparedRuns ?? "N/A"} alertRate=${hfShadowTrend.alertTriggeredRate ?? "N/A"} avgAbsPayloadDelta=${hfShadowTrend.avgAbsPayloadDelta ?? "N/A"} avgAbsNotionalDelta=${hfShadowTrend.avgAbsNotionalDelta ?? "N/A"} avgAbsSkippedDelta=${hfShadowTrend.avgAbsSkippedDelta ?? "N/A"} zeroPayloadRate=${hfShadowTrend.zeroPayloadRate ?? "N/A"} latestAt=${hfShadowTrend.latestAt ?? "N/A"}\``
            );
            const hfAlert = preview?.hfAlert || {};
            lines.push(
              `- hf_alert: \`enabled=${hfAlert.enabled ?? "N/A"} triggered=${hfAlert.triggered ?? "N/A"} reason=${hfAlert.reason ?? "N/A"} shadowCompared=${hfAlert.shadowCompared ?? "N/A"} payloadDelta=${hfAlert.shadowPayloadDelta ?? "N/A"} notionalDelta=${hfAlert.shadowNotionalDelta ?? "N/A"} skippedDelta=${hfAlert.shadowSkippedDelta ?? "N/A"} driftTriggered=${hfAlert.driftTriggered ?? "N/A"}\``
            );
            const skipReasonCounts =
              preview?.skipReasonCounts && typeof preview.skipReasonCounts === "object"
                ? preview.skipReasonCounts
                : Array.isArray(preview?.skipped)
                    ? preview.skipped.reduce((acc, row) => {
                        const key = String(row?.reason || "unknown");
                        acc[key] = (acc[key] || 0) + 1;
                        return acc;
                      }, {})
                    : {};
            const skipReasonCell =
              Object.keys(skipReasonCounts).length > 0
                ? Object.entries(skipReasonCounts)
                    .sort((a, b) => Number(b[1]) - Number(a[1]))
                    .map(([k, v]) => `${k}:${v}`)
                    .join(", ")
                : "none";
            lines.push(`- skip_reasons: \`${skipReasonCell}\``);
            const idemp = preview?.idempotency || {};
            lines.push(
              `- idempotency: \`enabled=${idemp.enabled ?? "N/A"} enforce=${idemp.enforced ?? "N/A"} new=${idemp.newCount ?? "N/A"} duplicate=${idemp.duplicateCount ?? "N/A"}\``
            );
            const preflight = preview?.preflight || {};
            lines.push(
              `- preflight: \`status=${preflight.status ?? "N/A"} code=${preflight.code ?? "N/A"} blocking=${preflight.blocking ?? "N/A"} wouldBlockLive=${preflight.wouldBlockLive ?? "N/A"} liveParity=${preflight.simulatedLiveParity ?? "N/A"} required=${preflight.requiredNotional ?? "N/A"}\``
            );
            const guardControl = preview?.guardControl || {};
            const guardLevel =
              Number.isFinite(Number(guardControl.level)) ? `L${Number(guardControl.level)}` : "N/A";
            lines.push(
              `- guard_control: \`enforce=${guardControl.enforce ?? "N/A"} blocked=${guardControl.blocked ?? "N/A"} wouldBlockLive=${guardControl.wouldBlockLive ?? "N/A"} level=${guardLevel} stale=${guardControl.stale ?? "N/A"} updatedAt=${guardControl.updatedAt ?? "N/A"} reason=${guardControl.reason ?? "N/A"}\``
            );
            const mode = preview?.mode || {};
            lines.push(
              `- mode: \`readOnly=${mode.readOnly ?? "N/A"} execEnabled=${mode.execEnabled ?? "N/A"} liveMode=${mode.liveMode ?? "N/A"} simulationLiveParity=${mode.simulationLiveParity ?? "N/A"}\``
            );
            const stopDistancePolicy = preview?.stopDistancePolicy || {};
            if (Object.keys(stopDistancePolicy).length > 0) {
              lines.push(
                `- stop_distance_policy: \`sync=${stopDistancePolicy.syncWithStage6 ?? "N/A"} strategy=${stopDistancePolicy.strategy ?? "N/A"} configured=${stopDistancePolicy.configuredMinPct ?? "N/A"}~${stopDistancePolicy.configuredMaxPct ?? "N/A"} stage6=${stopDistancePolicy.stage6MinPct ?? "N/A"}~${stopDistancePolicy.stage6MaxPct ?? "N/A"} applied=${stopDistancePolicy.appliedMinPct ?? "N/A"}~${stopDistancePolicy.appliedMaxPct ?? "N/A"}\``
              );
            }
            const lifecycle = preview?.orderLifecycle || {};
            lines.push(
              `- order_lifecycle: \`enabled=${lifecycle.enabled ?? "N/A"} target=${lifecycle.targetStatus ?? "N/A"} upserted=${lifecycle.upserted ?? "N/A"} transitioned=${lifecycle.transitioned ?? "N/A"} unchanged=${lifecycle.unchanged ?? "N/A"}\``
            );
          } else {
            lines.push("- state/last-dry-exec-preview.json: not found (likely dedupe skip)");
            lines.push("- hf_soft_gate: `enabled=N/A applied=N/A netDelta=N/A earningsBlocked=N/A earningsReduced=N/A sizeReduceEnabled=N/A sizeReducePct=N/A sizeReduced=N/A sizeSavedNotional=N/A explain=N/A`");
            lines.push("- hf_shadow: `enabled=N/A compared=N/A reason=N/A payloadDelta=N/A notionalDelta=N/A onOnly=N/A offOnly=N/A skipReasonDelta=N/A`");
            lines.push("- hf_shadow_trend: `history=N/A window=N/A compared=N/A alertRate=N/A avgAbsPayloadDelta=N/A avgAbsNotionalDelta=N/A avgAbsSkippedDelta=N/A zeroPayloadRate=N/A latestAt=N/A`");
            lines.push("- hf_alert: `enabled=N/A triggered=N/A reason=N/A shadowCompared=N/A payloadDelta=N/A notionalDelta=N/A skippedDelta=N/A driftTriggered=N/A`");
          }

          if (fs.existsSync(hfMarkerAuditPath)) {
            const hfAudit = JSON.parse(fs.readFileSync(hfMarkerAuditPath, "utf8"));
            lines.push(
              `- hf_marker_audit: \`soft=${hfAudit.softGate ?? "missing"} drift=${hfAudit.driftMarker ?? "missing"} runSummary=${hfAudit.runSummaryHfDrift ?? "missing"} shadow=${hfAudit.shadowMarker ?? "missing"} runSummaryShadow=${hfAudit.runSummaryHfShadow ?? "missing"} runSummaryShadowTrend=${hfAudit.runSummaryHfShadowTrend ?? "missing"} alert=${hfAudit.alertMarker ?? "missing"} runSummaryAlert=${hfAudit.runSummaryHfAlert ?? "missing"}\``
            );
          } else {
            lines.push("- hf_marker_audit: `soft=missing drift=missing runSummary=missing shadow=missing runSummaryShadow=missing runSummaryShadowTrend=missing alert=missing runSummaryAlert=missing`");
          }

          if (fs.existsSync(idempPath)) {
            const idemp = JSON.parse(fs.readFileSync(idempPath, "utf8"));
            const count = idemp?.orders && typeof idemp.orders === "object" ? Object.keys(idemp.orders).length : 0;
            lines.push(`- idempotency key store: \`${count}\` keys`);
          } else {
            lines.push("- idempotency key store: not found");
          }
          const lifecyclePath = "state/order-ledger.json";
          if (fs.existsSync(lifecyclePath)) {
            const lifecycle = JSON.parse(fs.readFileSync(lifecyclePath, "utf8"));
            const count =
              lifecycle?.orders && typeof lifecycle.orders === "object"
                ? Object.keys(lifecycle.orders).length
                : 0;
            lines.push(`- order lifecycle store: \`${count}\` keys`);
          } else {
            lines.push("- order lifecycle store: not found");
          }
          const regimeStatePath = "state/regime-guard-state.json";
          if (fs.existsSync(regimeStatePath)) {
            const regimeState = JSON.parse(fs.readFileSync(regimeStatePath, "utf8"));
            lines.push(
              `- regime guard state: \`profile=${regimeState.lastProfile || "N/A"} switchedAt=${regimeState.lastSwitchedAt || "N/A"}\``
            );
          } else {
            lines.push("- regime guard state: not found");
          }
          const perfLoopPath = "state/stage6-20trade-loop.json";
          if (fs.existsSync(perfLoopPath)) {
            const perfLoop = JSON.parse(fs.readFileSync(perfLoopPath, "utf8"));
            const tradeCount =
              perfLoop?.rows && typeof perfLoop.rows === "object"
                ? Object.keys(perfLoop.rows).length
                : 0;
            const snapshotCount = Array.isArray(perfLoop?.snapshots) ? perfLoop.snapshots.length : 0;
            const requiredTrades = 20;
            lines.push(
              `- perf_loop: \`batch=${perfLoop?.batchId || "N/A"} trades=${tradeCount} snapshots=${snapshotCount}\``
            );
            let gateStatus = "PENDING_SAMPLE";
            let gateReason = `sample_insufficient(trades=${tradeCount},required>=${requiredTrades})`;
            let gateProgress = `${tradeCount}/${requiredTrades}`;
            if (snapshotCount > 0) {
              const latestSnapshot = perfLoop.snapshots[snapshotCount - 1] || {};
              const fillRate = Number.isFinite(Number(latestSnapshot.fillRatePct))
                ? Number(latestSnapshot.fillRatePct).toFixed(2)
                : "N/A";
              const avgR = Number.isFinite(Number(latestSnapshot.avgR))
                ? Number(latestSnapshot.avgR).toFixed(4)
                : "N/A";
              const holdErr = Number.isFinite(Number(latestSnapshot.medianHoldErrorDays))
                ? Number(latestSnapshot.medianHoldErrorDays).toFixed(2)
                : "N/A";
              const drift = Number.isFinite(Number(latestSnapshot.noReasonDrift))
                ? Number(latestSnapshot.noReasonDrift)
                : "N/A";
              lines.push(
                `- perf_loop_latest_kpi: \`trades=${latestSnapshot.tradeCount ?? tradeCount} fillRatePct=${fillRate} avgR=${avgR} holdErrMedian=${holdErr} noReasonDrift=${drift}\``
              );
              const snapshotTradeCount = Number(latestSnapshot.tradeCount ?? tradeCount);
              const hasEnoughTrades = snapshotTradeCount >= requiredTrades;
              const passFill = Number(latestSnapshot.fillRatePct) >= 60;
              const passAvgR = Number(latestSnapshot.avgR) > 0;
              const passDrift = Number(latestSnapshot.noReasonDrift) === 0;
              gateProgress = `${Math.min(snapshotTradeCount, requiredTrades)}/${requiredTrades}`;
              if (hasEnoughTrades) {
                const failReasons = [];
                if (!passFill) failReasons.push("fill_rate_below_60");
                if (!passAvgR) failReasons.push("avgR_not_positive");
                if (!passDrift) failReasons.push("reason_drift_detected");
                if (failReasons.length === 0) {
                  gateStatus = "GO";
                  gateReason = "all_must_pass_checks_ok";
                } else {
                  gateStatus = "NO_GO";
                  gateReason = failReasons.join("|");
                }
              } else {
                gateStatus = "PENDING_SAMPLE";
                gateReason = `sample_insufficient(trades=${snapshotTradeCount},required>=${requiredTrades})`;
              }
            } else {
              lines.push("- perf_loop_latest_kpi: `N/A (no 10-trade snapshot yet)`");
            }
            lines.push(`- perf_loop_gate_status: \`${gateStatus}\``);
            lines.push(`- perf_loop_gate_reason: \`${gateReason}\``);
            lines.push(`- perf_loop_gate_progress: \`${gateProgress}\``);
          } else {
            lines.push("- perf_loop: not found");
          }

          lines.push("");

          if (includeValidationPack && fs.existsSync("state/validation-pack")) {
            const cases = ["off", "on", "strict"];
            const packLines = [];
            packLines.push("## Entry Feasibility Validation Pack");
            packLines.push("| case | stage6Hash | payloads/skipped | enforce/maxDist | blocked | preflight |");
            packLines.push("|---|---|---|---|---|---|");

            for (const c of cases) {
              const runPath = `state/validation-pack/${c}/last-run.json`;
              const previewPathCase = `state/validation-pack/${c}/last-dry-exec-preview.json`;
              if (!fs.existsSync(runPath) || !fs.existsSync(previewPathCase)) {
                packLines.push(`| ${c} | N/A | N/A | N/A | N/A | N/A |`);
                continue;
              }
              const runState = JSON.parse(fs.readFileSync(runPath, "utf8"));
              const previewCase = JSON.parse(fs.readFileSync(previewPathCase, "utf8"));
              const stageHash = (runState.lastStage6Sha256 || "").slice(0, 12) || "N/A";
              const payloads = `${previewCase.payloadCount ?? "N/A"}/${previewCase.skippedCount ?? "N/A"}`;
              const entryFeas = previewCase.entryFeasibility || {};
              const enforce = entryFeas.enforce ?? "N/A";
              const maxDist = entryFeas.maxDistancePct ?? "N/A";
              const blocked = entryFeas.blocked ?? "N/A";
              const preflight = previewCase.preflight || {};
              const preflightCell = `${preflight.status ?? "N/A"}:${preflight.code ?? "N/A"}`;
              packLines.push(`| ${c} | ${stageHash} | ${payloads} | ${enforce}/${maxDist} | ${blocked} | ${preflightCell} |`);
            }
            packLines.push("");
            lines.push(...packLines);
          }

          if (
            includePayloadProbe &&
            fs.existsSync("state/payload-probe/last-run.json") &&
            fs.existsSync("state/payload-probe/last-dry-exec-preview.json")
          ) {
            const probeRun = JSON.parse(fs.readFileSync("state/payload-probe/last-run.json", "utf8"));
            const probePreview = JSON.parse(fs.readFileSync("state/payload-probe/last-dry-exec-preview.json", "utf8"));
            const probeLines = [];
            probeLines.push("## Payload Path Probe");
            probeLines.push(`- stage6Hash: \`${(probeRun.lastStage6Sha256 || "").slice(0, 12) || "N/A"}\``);
            probeLines.push(`- payloads/skipped: \`${probePreview.payloadCount ?? "N/A"}/${probePreview.skippedCount ?? "N/A"}\``);
            probeLines.push(
              `- preflight: \`${probePreview?.preflight?.status ?? "N/A"}:${probePreview?.preflight?.code ?? "N/A"}\``
            );
            const stage6Contract = probePreview?.stage6Contract || {};
            probeLines.push(
              `- stage6_contract: \`enforce=${stage6Contract.enforce ?? "N/A"} checked=${stage6Contract.checked ?? "N/A"} executable=${stage6Contract.executable ?? "N/A"} blocked=${stage6Contract.blocked ?? "N/A"}\``
            );
            const probeSkipCounts =
              probePreview?.skipReasonCounts && typeof probePreview.skipReasonCounts === "object"
                ? probePreview.skipReasonCounts
                : Array.isArray(probePreview?.skipped)
                    ? probePreview.skipped.reduce((acc, row) => {
                        const key = String(row?.reason || "unknown");
                        acc[key] = (acc[key] || 0) + 1;
                        return acc;
                      }, {})
                    : {};
            const probeSkipCell =
              Object.keys(probeSkipCounts).length > 0
                ? Object.entries(probeSkipCounts)
                    .sort((a, b) => Number(b[1]) - Number(a[1]))
                    .map(([k, v]) => `${k}:${v}`)
                    .join(", ")
                : "none";
            probeLines.push(`- skip_reasons: \`${probeSkipCell}\``);
            probeLines.push("");
            lines.push(...probeLines);
          }

          fs.appendFileSync(summaryPath, lines.join("\n") + "\n");
          NODE

      - name: Upload sidecar state artifact
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: sidecar-state-${{ github.run_id }}
          path: |
            state/last-run.json
            state/last-dry-exec-preview.json
            state/hf-marker-audit.json
            state/hf-shadow-last.json
            state/hf-shadow-history.jsonl
            state/last-run-output.log
            state/order-idempotency.json
            state/order-ledger.json
            state/regime-guard-state.json
            state/stage6-20trade-loop.json
            state/stage6-20trade-loop.csv
            state/validation-pack/**
            state/payload-probe/**
          if-no-files-found: warn

      - name: Save sidecar state
        if: always()
        uses: actions/cache/save@v5
        with:
          path: state
          key: sidecar-state-${{ github.ref_name }}-${{ github.run_id }}
