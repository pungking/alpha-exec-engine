name: sidecar-market-guard

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * 1-5"

concurrency:
  group: sidecar-market-guard-${{ github.ref }}
  cancel-in-progress: false

jobs:
  market-guard:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      EXEC_ENABLED: ${{ vars.EXEC_ENABLED }}
      READ_ONLY: ${{ vars.READ_ONLY }}
      POLICY_VERSION: stage6-exec-v1.0-rc1
      TZ: ${{ vars.TZ }}

      REGIME_VIX_SOURCE_PRIORITY: ${{ vars.REGIME_VIX_SOURCE_PRIORITY }}
      REGIME_SNAPSHOT_MAX_AGE_MIN: ${{ vars.REGIME_SNAPSHOT_MAX_AGE_MIN }}
      REGIME_QUALITY_GUARD_ENABLED: ${{ vars.REGIME_QUALITY_GUARD_ENABLED }}
      REGIME_QUALITY_MIN_SCORE: ${{ vars.REGIME_QUALITY_MIN_SCORE }}
      REGIME_VIX_MISMATCH_PCT: ${{ vars.REGIME_VIX_MISMATCH_PCT }}
      VIX_RISK_ON_THRESHOLD: ${{ vars.VIX_RISK_ON_THRESHOLD }}
      VIX_RISK_OFF_THRESHOLD: ${{ vars.VIX_RISK_OFF_THRESHOLD }}

      MARKET_GUARD_ENABLED: ${{ vars.MARKET_GUARD_ENABLED }}
      MARKET_GUARD_MODE: ${{ vars.MARKET_GUARD_MODE }}
      MARKET_GUARD_INTERVAL_MIN: ${{ vars.MARKET_GUARD_INTERVAL_MIN }}
      MARKET_GUARD_FORCE_SEND_ONCE: ${{ vars.MARKET_GUARD_FORCE_SEND_ONCE }}
      GUARD_ALLOW_OUTSIDE_RTH: ${{ vars.GUARD_ALLOW_OUTSIDE_RTH }}
      GUARD_USE_INDEX_DROP: ${{ vars.GUARD_USE_INDEX_DROP }}
      GUARD_QUALITY_ESCALATE_ENABLED: ${{ vars.GUARD_QUALITY_ESCALATE_ENABLED }}
      GUARD_QUALITY_MIN_SCORE: ${{ vars.GUARD_QUALITY_MIN_SCORE }}
      GUARD_FORCE_LEVEL: ${{ vars.GUARD_FORCE_LEVEL }}
      GUARD_DEESCALATE_HOLD_MIN: ${{ vars.GUARD_DEESCALATE_HOLD_MIN }}
      GUARD_ACTION_COOLDOWN_MIN: ${{ vars.GUARD_ACTION_COOLDOWN_MIN }}
      GUARD_ACTION_LEDGER_TTL_DAYS: ${{ vars.GUARD_ACTION_LEDGER_TTL_DAYS }}
      GUARD_L1_VIX: ${{ vars.GUARD_L1_VIX }}
      GUARD_L2_VIX: ${{ vars.GUARD_L2_VIX }}
      GUARD_L3_VIX: ${{ vars.GUARD_L3_VIX }}
      GUARD_L2_INDEX_DROP_PCT: ${{ vars.GUARD_L2_INDEX_DROP_PCT }}
      GUARD_L3_INDEX_DROP_PCT: ${{ vars.GUARD_L3_INDEX_DROP_PCT }}
      GUARD_TIGHTEN_STOP_PCT_L2: ${{ vars.GUARD_TIGHTEN_STOP_PCT_L2 }}
      GUARD_TIGHTEN_STOP_PCT_L3: ${{ vars.GUARD_TIGHTEN_STOP_PCT_L3 }}
      GUARD_MARKET_ORDER_TIF: ${{ vars.GUARD_MARKET_ORDER_TIF }}
      GUARD_STOP_ORDER_TIF: ${{ vars.GUARD_STOP_ORDER_TIF }}
      GUARD_EXECUTE_TIGHTEN_STOPS: ${{ vars.GUARD_EXECUTE_TIGHTEN_STOPS }}
      GUARD_EXECUTE_REDUCE_POSITIONS: ${{ vars.GUARD_EXECUTE_REDUCE_POSITIONS }}
      GUARD_EXECUTE_FLATTEN: ${{ vars.GUARD_EXECUTE_FLATTEN }}
      TELEGRAM_HEARTBEAT_ON_DEDUPE: ${{ vars.TELEGRAM_HEARTBEAT_ON_DEDUPE }}

      ALPACA_KEY_ID: ${{ secrets.ALPACA_KEY_ID }}
      ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
      ALPACA_BASE_URL: ${{ vars.ALPACA_BASE_URL }}

      GDRIVE_CLIENT_ID: ${{ secrets.GDRIVE_CLIENT_ID }}
      GDRIVE_CLIENT_SECRET: ${{ secrets.GDRIVE_CLIENT_SECRET }}
      GDRIVE_REFRESH_TOKEN: ${{ secrets.GDRIVE_REFRESH_TOKEN }}
      FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
      CNBC_RAPIDAPI_ENABLED: ${{ vars.CNBC_RAPIDAPI_ENABLED }}
      CNBC_RAPIDAPI_KEY: ${{ secrets.CNBC_RAPIDAPI_KEY }}
      RAPID_API_KEY: ${{ secrets.RAPID_API_KEY }}
      CNBC_RAPIDAPI_HOST: ${{ vars.CNBC_RAPIDAPI_HOST }}
      CNBC_RAPIDAPI_ENDPOINT: ${{ vars.CNBC_RAPIDAPI_ENDPOINT }}
      CNBC_RAPIDAPI_SYMBOL_PARAM: ${{ vars.CNBC_RAPIDAPI_SYMBOL_PARAM }}
      GDRIVE_ROOT_FOLDER_ID: ${{ vars.GDRIVE_ROOT_FOLDER_ID }}
      GDRIVE_MARKET_SNAPSHOT_FOLDER_ID: ${{ vars.GDRIVE_MARKET_SNAPSHOT_FOLDER_ID }}

      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_SIMULATION_CHAT_ID: ${{ vars.TELEGRAM_SIMULATION_CHAT_ID }}

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"

      - name: Restore sidecar state
        uses: actions/cache/restore@v5
        with:
          path: state
          key: sidecar-state-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            sidecar-state-${{ github.ref_name }}-

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify guard build output
        run: |
          ls -la dist/src || true
          test -f dist/src/market-guard.js

      - name: Run market guard
        run: npm run guard

      - name: Publish guard summary
        if: always()
        run: |
          node - <<'NODE'
          const fs = require("node:fs");
          const summaryPath = process.env.GITHUB_STEP_SUMMARY;
          const guardPath = "state/last-market-guard.json";
          const statePath = "state/market-guard-state.json";
          const ledgerPath = "state/guard-action-ledger.json";
          const controlPath = "state/guard-control.json";

          const lines = [];
          lines.push("## Sidecar Market Guard Summary");
          lines.push(
            `- runtime flags: \`EXEC_ENABLED=${process.env.EXEC_ENABLED ?? "N/A"} READ_ONLY=${process.env.READ_ONLY ?? "N/A"} MARKET_GUARD_MODE=${process.env.MARKET_GUARD_MODE ?? "N/A"} GUARD_FORCE_LEVEL=${process.env.GUARD_FORCE_LEVEL ?? "N/A"}\``
          );
          lines.push(
            `- guard policy flags: \`forceSendOnce=${process.env.MARKET_GUARD_FORCE_SEND_ONCE ?? "N/A"} allowOutsideRth=${process.env.GUARD_ALLOW_OUTSIDE_RTH ?? "N/A"} tighten=${process.env.GUARD_EXECUTE_TIGHTEN_STOPS ?? "N/A"} reduce=${process.env.GUARD_EXECUTE_REDUCE_POSITIONS ?? "N/A"} flatten=${process.env.GUARD_EXECUTE_FLATTEN ?? "N/A"} cooldownMin=${process.env.GUARD_ACTION_COOLDOWN_MIN ?? "N/A"} intervalMin=${process.env.MARKET_GUARD_INTERVAL_MIN ?? "N/A"}\``
          );

          if (fs.existsSync(guardPath)) {
            const guard = JSON.parse(fs.readFileSync(guardPath, "utf8"));
            lines.push(`- generatedAt: \`${guard.generatedAt || "N/A"}\``);
            lines.push(
              `- level: \`L${guard.level ?? "N/A"}\` (raw=L${guard.rawLevel ?? "N/A"}, vix=L${guard.vixLevel ?? "N/A"}, index=L${guard.indexLevel ?? "N/A"})`
            );
            lines.push(
              `- signal: \`source=${guard.vixSource || "N/A"} vix=${guard.vix ?? "N/A"} indexDrop=${guard.indexWorstDropPct ?? "N/A"}\``
            );
            lines.push(
              `- quality: \`${guard.quality?.status || "N/A"} (${guard.quality?.score ?? "N/A"}/${guard.quality?.minScore ?? "N/A"}) force=${guard.quality?.forceEscalate ?? "N/A"}\``
            );
            lines.push(
              `- action: \`mode=${guard.mode || "N/A"} run=${guard.shouldRunActions ?? "N/A"} reason=${guard.actionReason || "N/A"} actions=${Array.isArray(guard.actions) ? guard.actions.length : 0}\``
            );
          } else {
            lines.push("- state/last-market-guard.json: not found");
          }

          if (fs.existsSync(statePath)) {
            const state = JSON.parse(fs.readFileSync(statePath, "utf8"));
            lines.push(
              `- guard state: \`lastLevel=L${state.lastLevel ?? "N/A"} changedAt=${state.lastLevelChangedAt || "N/A"} cooldownUntil=${state.cooldownUntil || "N/A"}\``
            );
          } else {
            lines.push("- state/market-guard-state.json: not found");
          }

          if (fs.existsSync(ledgerPath)) {
            const ledger = JSON.parse(fs.readFileSync(ledgerPath, "utf8"));
            const count = ledger?.actions && typeof ledger.actions === "object" ? Object.keys(ledger.actions).length : 0;
            lines.push(`- action ledger keys: \`${count}\``);
          } else {
            lines.push("- state/guard-action-ledger.json: not found");
          }

          if (fs.existsSync(controlPath)) {
            const control = JSON.parse(fs.readFileSync(controlPath, "utf8"));
            lines.push(
              `- guard control: \`haltNewEntries=${control?.haltNewEntries ?? "N/A"} level=${control?.level ?? "N/A"} updatedAt=${control?.updatedAt || "N/A"}\``
            );
          } else {
            lines.push("- state/guard-control.json: not found");
          }

          lines.push("");
          fs.appendFileSync(summaryPath, lines.join("\n") + "\n");
          NODE

      - name: Sync market guard summary to Notion
        if: always()
        continue-on-error: ${{ vars.NOTION_MARKET_GUARD_SYNC_REQUIRED != 'true' && vars.NOTION_GUARD_ACTION_LOG_SYNC_REQUIRED != 'true' }}
        env:
          NOTION_SYNC_KIND: market_guard
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_DAILY_SNAPSHOT: ${{ vars.NOTION_DB_DAILY_SNAPSHOT }}
          NOTION_DB_GUARD_ACTION_LOG: ${{ vars.NOTION_DB_GUARD_ACTION_LOG }}
          NOTION_MARKET_GUARD_SYNC_ENABLED: ${{ vars.NOTION_MARKET_GUARD_SYNC_ENABLED }}
          NOTION_MARKET_GUARD_SYNC_REQUIRED: ${{ vars.NOTION_MARKET_GUARD_SYNC_REQUIRED }}
          NOTION_GUARD_ACTION_LOG_SYNC_ENABLED: ${{ vars.NOTION_GUARD_ACTION_LOG_SYNC_ENABLED }}
          NOTION_GUARD_ACTION_LOG_SYNC_REQUIRED: ${{ vars.NOTION_GUARD_ACTION_LOG_SYNC_REQUIRED }}
          GHA_JOB_STATUS: ${{ job.status }}
        run: node scripts/sync-notion-summary.mjs

      - name: Upload guard artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: sidecar-guard-state-${{ github.run_id }}
          path: |
            state/last-market-guard.json
            state/market-guard-state.json
            state/guard-action-ledger.json
            state/guard-control.json
            state/last-run.json
            state/last-dry-exec-preview.json
            state/order-idempotency.json
            state/order-ledger.json
            state/regime-guard-state.json
          if-no-files-found: warn

      - name: Save sidecar state
        if: always()
        uses: actions/cache/save@v5
        with:
          path: state
          key: sidecar-state-${{ github.ref_name }}-${{ github.run_id }}
