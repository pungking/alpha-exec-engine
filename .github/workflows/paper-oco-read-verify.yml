name: paper-oco-read-verify

on:
  workflow_dispatch:
    inputs:
      source_run_id:
        description: "sidecar-dry-run run id to read state from (blank = latest successful dry-run)"
        required: false
        default: ""
        type: string
      require_market_open:
        description: "Require Alpaca paper clock.is_open for the read precheck gate"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  actions: read
  contents: read

concurrency:
  group: paper-oco-read-verify-${{ github.ref }}
  cancel-in-progress: false

jobs:
  read-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      GH_TOKEN: ${{ github.token }}
      ALPHA_ENV: PAPER
      ALPACA_BASE_URL: https://paper-api.alpaca.markets
      ALPACA_KEY_ID: ${{ secrets.ALPACA_KEY_ID }}
      ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
      PAPER_OCO_SUBMIT_STATE_DIR: _paper_oco_state
      PAPER_OCO_CANARY_READ_VERIFY: "true"
      PAPER_OCO_CANARY_REQUIRE_MARKET_OPEN: ${{ inputs.require_market_open }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Resolve source sidecar run
        id: resolve
        shell: bash
        run: |
          set -euo pipefail
          run_id="${{ inputs.source_run_id }}"
          if [[ -z "${run_id}" ]]; then
            run_id="$(gh run list --repo "${GITHUB_REPOSITORY}" --workflow dry-run.yml --status success --limit 20 --json databaseId --jq '.[0].databaseId')"
          fi
          if [[ -z "${run_id}" || "${run_id}" == "null" ]]; then
            echo "No successful sidecar-dry-run run found" >&2
            exit 1
          fi
          artifact="$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}/artifacts" --jq '.artifacts[] | select(.expired == false) | select(.name | startswith("sidecar-state-")) | .name' | head -n 1)"
          if [[ -z "${artifact}" ]]; then
            echo "No non-expired sidecar-state artifact found for run ${run_id}" >&2
            exit 1
          fi
          echo "run_id=${run_id}" >> "${GITHUB_OUTPUT}"
          echo "artifact=${artifact}" >> "${GITHUB_OUTPUT}"
          echo "Resolved source sidecar run ${run_id} artifact ${artifact}"

      - name: Download source sidecar state artifact
        shell: bash
        run: |
          set -euo pipefail
          rm -rf _paper_oco_state
          mkdir -p _paper_oco_state
          gh run download "${{ steps.resolve.outputs.run_id }}" \
            --repo "${GITHUB_REPOSITORY}" \
            --name "${{ steps.resolve.outputs.artifact }}" \
            --dir _paper_oco_state
          test -f _paper_oco_state/paper-oco-canary-candidate.json
          test -f _paper_oco_state/paper-oco-canary-approval-gate.json
          test -f _paper_oco_state/paper-oco-canary-submit-gate.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run non-mutating Alpaca paper read precheck
        run: npm run ops:paper-oco-submit-gate

      - name: Verify read precheck remained non-mutating
        shell: bash
        run: |
          set -euo pipefail
          node --input-type=module <<'NODE'
          import fs from 'node:fs';
          const report = JSON.parse(fs.readFileSync('_paper_oco_state/paper-oco-canary-submit-gate.json', 'utf8'));
          const failures = [];
          if (report.executionPolicy?.readVerifyEnabled !== true) failures.push('readVerifyEnabled_not_true');
          if (report.brokerMutation?.attempted !== false) failures.push('brokerMutation_attempted_not_false');
          if (report.brokerMutation?.submitted !== false) failures.push('brokerMutation_submitted_not_false');
          if (report.payloadPreview?.order_class !== 'oco') failures.push('payloadPreview_order_class_not_oco');
          if (report.executionPolicy?.targetEnvironment !== 'PAPER') failures.push('targetEnvironment_not_paper');
          if (report.executionPolicy?.brokerMutationImplemented !== false) failures.push('brokerMutationImplemented_not_false');
          if (failures.length) {
            console.error(`paper OCO read precheck safety verification failed: ${failures.join(',')}`);
            process.exit(1);
          }
          console.log(JSON.stringify({
            overall: report.overall,
            decision: report.decision?.status,
            selectedSymbol: report.summary?.selectedSymbol,
            brokerMutationAttempted: report.summary?.brokerMutationAttempted,
            brokerMutationSubmitted: report.summary?.brokerMutationSubmitted,
            readVerifyEnabled: report.executionPolicy?.readVerifyEnabled
          }, null, 2));
          NODE

      - name: Publish summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Paper OCO Read Verify"
            echo "- sourceRun: \`${{ steps.resolve.outputs.run_id }}\`"
            echo "- sourceArtifact: \`${{ steps.resolve.outputs.artifact }}\`"
            echo "- brokerMutation: \`non-mutating GET-only precheck; no POST /v2/orders\`"
            echo ""
            if [[ -f _paper_oco_state/paper-oco-canary-submit-gate.md ]]; then
              cat _paper_oco_state/paper-oco-canary-submit-gate.md
            else
              echo "- status: \`missing state/paper-oco-canary-submit-gate.md\`"
            fi
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload read verify artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: paper-oco-read-verify-${{ github.run_id }}
          path: |
            _paper_oco_state/paper-oco-canary-submit-gate.json
            _paper_oco_state/paper-oco-canary-submit-gate.md
          if-no-files-found: warn
