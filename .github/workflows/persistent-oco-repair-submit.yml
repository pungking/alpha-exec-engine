name: persistent-oco-repair-submit

on:
  workflow_dispatch:
    inputs:
      confirm_live_execution:
        description: "Required exact phrase: CONFIRM LIVE EXECUTION"
        required: true
        type: string
      source_run_id:
        description: "sidecar-dry-run run id to read state from (blank = latest successful dry-run)"
        required: false
        default: ""
        type: string
      require_market_open:
        description: "Require Alpaca paper clock.is_open before POST"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  actions: read
  contents: read

concurrency:
  group: persistent-oco-repair-submit-${{ github.ref }}
  cancel-in-progress: false

jobs:
  submit-persistent-repair:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      GH_TOKEN: ${{ github.token }}
      ALPHA_ENV: PAPER
      ALPACA_BASE_URL: https://paper-api.alpaca.markets
      ALPACA_KEY_ID: ${{ secrets.ALPACA_KEY_ID }}
      ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
      PERSISTENT_OCO_REPAIR_SUBMIT_STATE_DIR: state
      PERSISTENT_OCO_REPAIR_READ_VERIFY: "true"
      PERSISTENT_OCO_REPAIR_SUBMIT_ENABLED: "true"
      PERSISTENT_OCO_REPAIR_REQUIRE_MARKET_OPEN: ${{ inputs.require_market_open }}
      PERSISTENT_OCO_REPAIR_APPROVAL_PHRASE: ${{ inputs.confirm_live_execution }}
      PERSISTENT_OCO_REPAIR_VISIBILITY_DELAY_MS: "1500"

    steps:
      - name: Verify approval phrase
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ inputs.confirm_live_execution }}" != "CONFIRM LIVE EXECUTION" ]]; then
            echo "Exact approval phrase missing; refusing persistent paper broker mutation." >&2
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Resolve source sidecar run
        id: resolve
        shell: bash
        run: |
          set -euo pipefail
          run_id="${{ inputs.source_run_id }}"
          if [[ -z "${run_id}" ]]; then
            run_id="$(gh run list --repo "${GITHUB_REPOSITORY}" --workflow dry-run.yml --status success --limit 20 --json databaseId --jq '.[0].databaseId')"
          fi
          if [[ -z "${run_id}" || "${run_id}" == "null" ]]; then
            echo "No successful sidecar-dry-run run found" >&2
            exit 1
          fi
          artifact="$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}/artifacts" --jq '.artifacts[] | select(.expired == false) | select(.name | startswith("sidecar-state-")) | .name' | head -n 1)"
          if [[ -z "${artifact}" ]]; then
            echo "No non-expired sidecar-state artifact found for run ${run_id}" >&2
            exit 1
          fi
          echo "run_id=${run_id}" >> "${GITHUB_OUTPUT}"
          echo "artifact=${artifact}" >> "${GITHUB_OUTPUT}"
          echo "Resolved source sidecar run ${run_id} artifact ${artifact}"

      - name: Download source sidecar state artifact
        shell: bash
        run: |
          set -euo pipefail
          rm -rf state
          mkdir -p state
          gh run download "${{ steps.resolve.outputs.run_id }}" \
            --repo "${GITHUB_REPOSITORY}" \
            --name "${{ steps.resolve.outputs.artifact }}" \
            --dir state
          test -f state/persistent-oco-repair-plan.json
          test -f state/broker-child-order-reconciliation.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Submit one persistent paper OCO repair and leave open
        run: npm run ops:persistent-oco-submit

      - name: Rebuild live performance dashboard after persistent submit
        if: always()
        run: npm run dashboard:perf

      - name: Rebuild broker child reconciliation after persistent submit
        if: always()
        run: npm run ops:broker-child-reconcile

      - name: Verify persistent submit, nested visibility, and open protection
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          node --input-type=module <<'NODE'
          import fs from 'node:fs';
          const report = JSON.parse(fs.readFileSync('state/persistent-oco-repair-submit-report.json', 'utf8'));
          const recon = fs.existsSync('state/broker-child-order-reconciliation.json')
            ? JSON.parse(fs.readFileSync('state/broker-child-order-reconciliation.json', 'utf8'))
            : null;
          const selectedSymbol = report.summary?.selectedSymbol;
          const selectedRecon = Array.isArray(recon?.rows) ? recon.rows.find((row) => row.symbol === selectedSymbol) : null;
          const failures = [];
          if (report.executionPolicy?.brokerMutationRequested !== true) failures.push('brokerMutationRequested_not_true');
          if (report.executionPolicy?.autoCancelEnabled !== false) failures.push('autoCancel_not_false');
          if (report.brokerMutation?.attempted !== true) failures.push('brokerMutation_attempted_not_true');
          if (report.brokerMutation?.submitted !== true) failures.push('brokerMutation_submitted_not_true');
          if (report.postSubmitVisibility?.ok !== true) failures.push('nested_visibility_not_ok');
          if (report.postSubmitVisibility?.persistentOpen !== true) failures.push('persistent_open_not_true');
          if (report.idempotency?.status !== 'persistent_visible_open') failures.push('idempotency_not_persistent_visible_open');
          if (report.selected?.repairQty !== 1) failures.push('repairQty_not_one');
          if (!selectedRecon) failures.push('selected_symbol_missing_from_reconciliation');
          if (selectedRecon && selectedRecon.brokerStopPresent !== true) failures.push('selected_recon_stop_not_present');
          if (selectedRecon && selectedRecon.brokerTargetPresent !== true) failures.push('selected_recon_target_not_present');
          console.log(JSON.stringify({
            overall: report.overall,
            decision: report.decision?.status,
            selectedSymbol,
            brokerMutationAttempted: report.summary?.brokerMutationAttempted,
            brokerMutationSubmitted: report.summary?.brokerMutationSubmitted,
            persistentOpen: report.summary?.persistentOpen,
            ledgerStatus: report.summary?.ledgerStatus,
            selectedRecon: selectedRecon ? {
              protectionStatus: selectedRecon.protectionStatus,
              brokerStopPresent: selectedRecon.brokerStopPresent,
              brokerTargetPresent: selectedRecon.brokerTargetPresent,
              brokerSellOrderCount: selectedRecon.brokerSellOrderCount
            } : null,
            clientOrderId: report.summary?.clientOrderId
          }, null, 2));
          if (failures.length) {
            console.error(`persistent OCO repair verification failed: ${failures.join(',')}`);
            process.exit(1);
          }
          NODE

      - name: Publish summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Persistent OCO Repair Submit"
            echo "- sourceRun: \`${{ steps.resolve.outputs.run_id }}\`"
            echo "- sourceArtifact: \`${{ steps.resolve.outputs.artifact }}\`"
            echo "- brokerMutation: \`approved one-row PAPER persistent OCO repair; no auto-cancel\`"
            echo ""
            if [[ -f state/persistent-oco-repair-submit-report.md ]]; then
              cat state/persistent-oco-repair-submit-report.md
            else
              echo "- status: \`missing state/persistent-oco-repair-submit-report.md\`"
            fi
            echo ""
            if [[ -f state/broker-child-order-reconciliation.md ]]; then
              cat state/broker-child-order-reconciliation.md
            else
              echo "- status: \`missing state/broker-child-order-reconciliation.md\`"
            fi
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload persistent OCO repair submit artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: persistent-oco-repair-submit-${{ github.run_id }}
          path: |
            state/persistent-oco-repair-submit-report.json
            state/persistent-oco-repair-submit-report.md
            state/persistent-oco-repair-submit-ledger.json
            state/performance-dashboard.json
            state/performance-dashboard.md
            state/broker-child-order-reconciliation.json
            state/broker-child-order-reconciliation.md
          if-no-files-found: warn
