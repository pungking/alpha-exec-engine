name: sidecar-ci

on:
  push:
    branches: [ "main" ]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
      - name: Install
        run: npm ci
      - name: Symbol-agnostic runtime guard
        run: npm run ops:safety:symbol-agnostic
      - name: Protection classification report contract
        run: |
          npm run ops:test:protection-lanes
          npm run ops:test:protection-report
          npm run ops:test:guard-source-recovery-status
          npm run ops:test:live-readiness-blockers
      - name: Automatic trigger execution safety contract
        run: npm run ops:test:dry-run-dispatch-safety
      - name: Telegram routing policy audit
        run: npm run ops:safety:telegram-routing
      - name: High-price min-one-share report-only self-test
        run: node scripts/build-high-price-min-one-share-canary-plan.mjs --self-test
      - name: High-price min-one-share report-only fixtures
        run: npm run ops:high-price:min-one-share-fixtures
      - name: Typecheck
        run: npm run typecheck
      - name: HF Verify (Unit + Replay Fixture)
        run: npm run verify:hf
